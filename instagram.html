<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ansia – Instagram</title>
  <style>
    :root {
      --bg: #080808;
      --text: #ffffff;
      --text-dim: rgba(255,255,255,0.65);
      --text-mute: rgba(255,255,255,0.35);
      --radius: 20px;
      --radius-sm: 14px;
      --sb-w: 74px;
      --blur: 6px;
      --blur-heavy: 12px;
      --glass-bg: rgba(255,255,255,0.20);
      --glass-bg-hover: rgba(255,255,255,0.28);
      --glass-shine: rgba(255,255,255,0.26);
      --glass-border: rgba(255,255,255,0.22);
      --shadow-card: 0 6px 32px rgba(0,0,0,0.32), 0 1px 0 rgba(255,255,255,0.08) inset;
      --shadow-hover: 0 12px 40px rgba(0,0,0,0.40), 0 1px 0 rgba(255,255,255,0.14) inset;
      --accent-c1: #ffffff;
      --accent-c2: #ffffff;
      --accent-c3: #ffffff;
      --accent-glow: rgba(255,255,255,0.40);
      --accent-glow-strong: rgba(255,255,255,0.60);
      --dyn-border-a: rgba(255,255,255,0.26);
      --dyn-border-b: rgba(255,255,255,0.16);
      --sb-hover-bg: rgba(255,255,255,0.10);
      --sb-active-bg: rgba(255,255,255,0.14);
      --sb-div-color: rgba(255,255,255,0.14);
      --body-overlay: rgba(0,0,0,0.38);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { background:#0a0a0a; scroll-behavior:smooth; }
    html, body { height:100%; overflow-x:hidden; }
    body {
      background: #0a0a0a url('https://raw.githubusercontent.com/ans1a/ans1a.github.io/refs/heads/main/bgp.gif') center/cover fixed;
      color: var(--text);
      font-family: -apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
      font-weight: 700;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background: var(--body-overlay);
      z-index:0; pointer-events:none;
      transition: background 0.8s ease;
    }
    .dashboard {
      display: grid;
      grid-template-columns: var(--sb-w) 1fr;
      gap: 10px;
      max-width: min(96vw, 500px);
      width: 92%;
      margin: 0 auto;
      padding: 14px 0 20px;
      align-items: start;
      position: relative; z-index: 1;
      opacity: 0; transform: translateY(-14px);
      transition: opacity .6s ease, transform .6s ease;
    }
    .dashboard.revealed { opacity:1; transform:translateY(0); }
    .sidebar {
      display: flex; flex-direction: column; align-items: center;
      padding: 14px 0 12px; gap: 4px;
      position: sticky; top: 14px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-shine);
      border-radius: var(--radius);
      backdrop-filter: blur(var(--blur-heavy)) saturate(1.5) brightness(1.04);
      -webkit-backdrop-filter: blur(var(--blur-heavy)) saturate(1.5) brightness(1.04);
      box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.14);
      transition: background 0.7s ease, border-color 0.7s ease, box-shadow 0.7s ease;
    }
    .sb-icon {
      width:42px; height:42px;
      display:flex; align-items:center; justify-content:center;
      border-radius:12px; cursor:pointer;
      color:var(--text-dim); text-decoration:none;
      transition: background .18s, color .18s, box-shadow .18s;
    }
    .sb-icon:hover { background: var(--sb-hover-bg); color:var(--text); }
    .sb-icon.active { background: var(--sb-active-bg); color:var(--text); box-shadow: 0 0 12px var(--accent-glow); }
    .sb-icon svg { width:18px; height:18px; fill:currentColor; }
    .sb-div { width:24px; height:1px; background: var(--sb-div-color); margin:5px 0; transition: background 0.7s ease; }
    .sb-label {
      font-size:8px; font-weight:900; letter-spacing:1.2px;
      color:var(--text-mute); text-transform:uppercase;
      margin-top:auto; padding-top:14px;
      writing-mode:vertical-lr; transform:rotate(180deg);
    }
    .profile-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-shine);
      border-radius: var(--radius);
      backdrop-filter: blur(var(--blur-heavy)) saturate(1.5) brightness(1.04);
      -webkit-backdrop-filter: blur(var(--blur-heavy)) saturate(1.5) brightness(1.04);
      box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.14);
      padding: 50px 36px 46px;
      display: flex; flex-direction: column; align-items: center;
      gap: 24px; position: relative; overflow: hidden;
      min-height: 460px; justify-content: center;
      transition: background 0.7s ease, border-color 0.7s ease, box-shadow 0.7s ease;
    }
    .profile-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      border-radius:20px 20px 0 0;
      background: linear-gradient(90deg, var(--accent-c1) 0%, var(--accent-c2) 50%, var(--accent-c1) 100%);
      background-size: 200% auto;
      box-shadow: 0 0 10px var(--accent-glow), 0 0 22px var(--accent-glow-strong);
      animation: shiftLine 3s ease-in-out infinite;
    }
    .profile-card::after {
      content:''; position:absolute; inset:0; pointer-events:none;
      background: radial-gradient(ellipse 70% 40% at 50% 0%, var(--accent-glow) 0%, transparent 70%);
      border-radius: inherit;
      opacity: 0.35;
      transition: opacity 0.7s ease;
    }
    @keyframes shiftLine {
      0%,100% { background-position:0% center; }
      50%      { background-position:100% center; }
    }
    .plat-icon {
      width: 32px; height: 32px;
      display: flex; align-items:center; justify-content:center;
      opacity: 0.75;
    }
    .plat-icon svg { width:28px; height:28px; fill:#fff; animation: iconGlow 2.5s ease-in-out infinite; }
    @keyframes iconGlow {
      0%,100% { filter:drop-shadow(0 0 3px var(--accent-glow)); }
      50%      { filter:drop-shadow(0 0 10px var(--accent-glow-strong)); }
    }
    .profile-photo-wrap { position: relative; }
    .profile-photo {
      width: 160px; height: 160px; border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--glass-border);
      box-shadow: 0 0 24px var(--accent-glow), 0 4px 20px rgba(0,0,0,0.50);
      transition: box-shadow .4s, transform .3s, border-color .7s;
    }
    .profile-photo:hover {
      box-shadow: 0 0 48px var(--accent-glow-strong), 0 0 80px var(--accent-glow), 0 4px 20px rgba(0,0,0,0.50);
      transform: scale(1.04);
    }
    .profile-photo-link { display:block; border-radius:50%; }
    .profile-username {
      font-size: 24px; font-weight: 900;
      letter-spacing: .2px; text-align: center;
      color: #fff;
      animation: textGlowPulse 2.5s ease-in-out infinite;
    }
    .profile-platform {
      font-size: 13px; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: rgba(255,255,255,0.50);
    }
    @keyframes textGlowPulse {
      0%   { text-shadow: 0 0 4px var(--accent-glow); }
      50%  { text-shadow: 0 0 14px var(--accent-glow), 0 0 30px var(--accent-glow); }
      100% { text-shadow: 0 0 4px var(--accent-glow); }
    }
    @media (max-width:480px) {
      .dashboard { grid-template-columns: 1fr; }
      .sidebar { flex-direction:row; position:static; padding:10px 14px; }
      .sb-div { width:1px; height:24px; margin:0 6px; }
      .sb-label { display:none; }
    }
  </style>
</head>

      '@keyframes iconGlow{0%,100%{filter:drop-shadow(0 0 '+px(3)+' '+ag+');}50%{filter:drop-shadow(0 0 '+px(10)+' '+rgba(a,+(0.55*gf).toFixed(3))+');}}',
      '@keyframes shiftLine{0%,100%{background-position:0% center;}50%{background-position:100% center;}}',
      '@keyframes photoRing{0%,100%{box-shadow:0 0 20px '+rgba(a,+(0.28*gf).toFixed(3))+',0 4px 20px rgba(0,0,0,0.5);}50%{box-shadow:0 0 42px '+rgba(a,+(0.54*gf).toFixed(3))+',0 0 64px '+rgba(s,+(0.20*gf).toFixed(3))+',0 4px 20px rgba(0,0,0,0.5);}}'
    ].join('');
    document.head.appendChild(se);

    var ph=document.querySelector('.profile-photo');
    if(ph){ph.style.animation='photoRing 3s ease-in-out infinite';ph.style.borderColor=rgba(a,0.40);}
    var sba=document.querySelector('.sb-icon.active');
    if(sba){sba.style.boxShadow='0 0 14px '+rgba(a,0.22)+', inset 0 0 8px '+rgba(a,0.10);}
  }

  function extractPalette(data){
    var B=80,bk=[];
    for(var i=0;i<B;i++)bk.push({n:0,r:0,g:0,b:0});
    for(var p=0;p<data.length;p+=4){
      if(data[p+3]<160)continue;
      var r=data[p],g=data[p+1],b=data[p+2];
      var L=lum(r,g,b);
      if(L<14||L>240)continue;
      var hsl=toHsl(r,g,b);
      if(hsl[1]<0.08)continue;
      var w=0.25+hsl[1]*0.75;
      var bi=Math.floor(hsl[0]*B)%B;
      bk[bi].n+=w;bk[bi].r+=r*w;bk[bi].g+=g*w;bk[bi].b+=b*w;
    }
    var sorted=bk.map(function(b,i){return{b:b,i:i};}).filter(function(x){return x.b.n>0;}).sort(function(a,b){return b.b.n-a.b.n;});
    var picked=[];
    for(var j=0;j<sorted.length&&picked.length<4;j++){
      var bki=sorted[j].b;
      var avg=[Math.round(bki.r/bki.n),Math.round(bki.g/bki.n),Math.round(bki.b/bki.n)];
      var ok=true;
      for(var k=0;k<picked.length;k++){if(cdist(avg,picked[k])<68){ok=false;break;}}
      if(ok)picked.push(avg);
    }
    return picked.length?picked:[[160,120,210]];
  }

  var img=new Image();img.crossOrigin='anonymous';
  img.onload=function(){try{var c=document.createElement('canvas');c.width=c.height=128;var x=c.getContext('2d');x.drawImage(img,0,0,128,128);apply(extractPalette(x.getImageData(0,0,128,128).data));}catch(e){}};
  img.src=WP+'?_cb='+Date.now();

  window.addEventListener('DOMContentLoaded',function(){
    setTimeout(function(){document.getElementById('card').classList.add('revealed');},400);
  });
})();
</script>
