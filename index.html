<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.8">
  <title>ansia – a's</title>
  <style>
    @import url('https://fonts.cdnfonts.com/css/allerta-stencil');
    :root{--glow:0 0 8px;}
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden;}
    body{
      display:flex;align-items:center;justify-content:center;
      background:#0a0a0a;color:#fff;
      font-family:'Evolve Sans',sans-serif;
    }

    /* ── INTRO OVERLAY ── */
    #intro{
      position:fixed;inset:0;z-index:999;
      background:rgba(0,0,0,1);
      display:flex;align-items:center;justify-content:center;
      transition:opacity 1s ease, backdrop-filter 1s ease;
    }
    #intro.fade-out{ opacity:0; pointer-events:none; }

    /* canvas de bolhas atrás do conteúdo da intro */
    #bubbleCanvas{
      position:absolute;inset:0;width:100%;height:100%;
    }

    /* ── BACKGROUND ── */
    #borderVid{
      position:fixed;inset:0;width:100%;height:100%;
      object-fit:cover;opacity:.6;z-index:-2;
    }
    #overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.60);z-index:-1;
    }

    /* ── CARD ── */
    .card{
      width:380px;min-height:385px;text-align:center;
      border-radius:20px;padding:40px;position:relative;margin:auto;
      /* começa invisível e fora da tela (acima) */
      opacity:0;
      transform:translateY(-60px);
      filter:blur(12px);
    }
    /* cada filho com delay escalonado cai de cima pra baixo */
    .card .slide-item{
      opacity:0;
      transform:translateY(-40px);
      filter:blur(8px);
      transition: opacity .6s ease, transform .6s ease, filter .6s ease;
    }
    .card.revealed{
      opacity:1;
      transform:translateY(0);
      filter:blur(0);
      transition: opacity .8s ease, transform .8s ease, filter .8s ease;
    }
    .card.revealed .slide-item{ opacity:1; transform:translateY(0); filter:blur(0); }
    .card.revealed .slide-item:nth-child(1){ transition-delay:.05s }
    .card.revealed .slide-item:nth-child(2){ transition-delay:.15s }
    .card.revealed .slide-item:nth-child(3){ transition-delay:.28s }
    .card.revealed .slide-item:nth-child(4){ transition-delay:.42s }
    .card.revealed .slide-item:nth-child(5){ transition-delay:.56s }
    .card.revealed .slide-item:nth-child(6){ transition-delay:.70s }
    .card.revealed .slide-item:nth-child(7){ transition-delay:.84s }

    .cardBgImg{
      position:absolute;inset:0;width:100%;height:100%;
      object-fit:cover;border-radius:20px;opacity:.50;z-index:-1;
    }
    .card::after{
      content:'';position:absolute;inset:0;border-radius:20px;
      background:rgba(1,0,0,.35);
      backdrop-filter:blur(0px) saturate(120%);
      -webkit-backdrop-filter:blur(0px) saturate(120%);
      z-index:-1;
    }
    .gif-wrap{
      width:128px;height:128px;
      margin:0 auto 16px;border-radius:50%;overflow:hidden;
    }
    .gif-wrap img{width:100%;height:100%;object-fit:cover;opacity:.59;}

    .title,.icons a svg,#playBtn,#lyrics{
      animation:glowWhite 2.5s ease-in-out infinite;
    }
    @keyframes glowWhite{
      0%  { color:#fff;text-shadow:var(--glow) #fff;fill:#fff;filter:drop-shadow(0 0 4px #fff); }
      50% { color:#fff;text-shadow:0 0 14px #fff,0 0 28px #fff;fill:#fff;filter:drop-shadow(0 0 10px #fff); }
      100%{ color:#fff;text-shadow:var(--glow) #fff;fill:#fff;filter:drop-shadow(0 0 4px #fff); }
    }
    .title{font-size:16px;font-weight:700;letter-spacing:.5px;margin-bottom:8px;}

    .star-wrap{
      display:flex;justify-content:center;align-items:center;
      margin-bottom:20px;height:36px;
    }
    .star{
      font-size:28px;line-height:1;color:#fff;
      animation:spinStar 4s linear infinite, glowStar 2.5s ease-in-out infinite;
      display:inline-block;transform-origin:center;
    }
    @keyframes spinStar{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    @keyframes glowStar{
      0%  {text-shadow:0 0 6px #fff,0 0 12px #fff;}
      50% {text-shadow:0 0 18px #fff,0 0 36px #fff,0 0 60px #fff;}
      100%{text-shadow:0 0 6px #fff,0 0 12px #fff;}
    }

    .icons{display:flex;justify-content:center;gap:26px;margin-bottom:2px;}
    .icons a{display:flex;align-items:center;justify-content:center;}
    .icons a svg{
      width:24px;height:24px;fill:#fff;
      transition:transform .15s;
      animation:glowWhite 2.5s ease-in-out infinite;
    }
    .icons a:active svg{transform:scale(.88);}

    #lyrics{margin-top:12px;font-size:10px;font-weight:700;height:14px;position:relative;}
    #lyrics span{position:absolute;left:0;right:0;transition:opacity .4s;color:#fff;}

    #playBtn{
      position:absolute;top:12px;left:16px;
      width:28px;height:28px;
      cursor:pointer;background:transparent;border:none;outline:none;padding:0;
    }
    #playBtn svg{width:100%;height:100%;display:block;fill:#fff;}
  </style>

<script>
// ── BUBBLE CANVAS (GTA 5 style) ──────────────────────────────
(function(){
  var canvas = document.getElementById('bubbleCanvas');
  var ctx    = canvas.getContext('2d');
  var W, H, bubbles = [];

  var colors = [
    'rgba(180,80,255,',   // roxo
    'rgba(80,180,255,',   // azul
    'rgba(255,80,160,',   // pink
    'rgba(80,255,180,',   // verde
    'rgba(255,200,80,',   // amarelo
    'rgba(255,120,80,',   // laranja
    'rgba(120,80,255,',   // violeta
  ];

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function Bubble(){
    this.x    = Math.random() * W;
    this.y    = H + Math.random() * 200;
    this.r    = 18 + Math.random() * 60;
    this.vy   = -(0.4 + Math.random() * 0.8);
    this.vx   = (Math.random() - 0.5) * 0.4;
    this.col  = colors[Math.floor(Math.random() * colors.length)];
    this.op   = 0.10 + Math.random() * 0.30;
    this.blur = 4  + Math.random() * 10;
    this.life = 0;
    this.max  = 180 + Math.random() * 120;
  }

  function spawnBubbles(){
    for(var i = 0; i < 28; i++){
      var b = new Bubble();
      b.y  = Math.random() * H;  // espalhadas desde o início
      b.life = Math.random() * b.max;
      bubbles.push(b);
    }
  }

  var alive = true;
  function draw(){
    if(!alive) return;
    ctx.clearRect(0, 0, W, H);

    // adiciona novas bolhas
    if(Math.random() < 0.25){
      bubbles.push(new Bubble());
    }

    for(var i = bubbles.length - 1; i >= 0; i--){
      var b = bubbles[i];
      b.x += b.vx;
      b.y += b.vy;
      b.life++;

      // fade in / fade out
      var progress = b.life / b.max;
      var alpha = b.op;
      if(progress < 0.15) alpha = b.op * (progress / 0.15);
      if(progress > 0.75) alpha = b.op * (1 - (progress - 0.75) / 0.25);

      ctx.save();
      ctx.filter = 'blur(' + b.blur + 'px)';
      var grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
      grad.addColorStop(0,   b.col + (alpha * 0.9) + ')');
      grad.addColorStop(0.5, b.col + (alpha * 0.5) + ')');
      grad.addColorStop(1,   b.col + '0)');
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // anel externo (brilho de borda da bolha)
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.strokeStyle = b.col + (alpha * 0.6) + ')';
      ctx.lineWidth   = 1.5;
      ctx.stroke();
      ctx.restore();

      if(b.life > b.max || b.y < -b.r) bubbles.splice(i, 1);
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  spawnBubbles();
  draw();

  // para o loop depois da intro sumir
  window._stopBubbles = function(){ alive = false; };
})();

// ── INTRO TIMER ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function(){
  var intro = document.getElementById('intro');
  var card  = document.getElementById('card');

  setTimeout(function(){
    // fade out da intro
    intro.classList.add('fade-out');

    // revela o card (slide de cima pra baixo com blur)
    card.classList.add('revealed');

    setTimeout(function(){
      intro.style.display = 'none';
      window._stopBubbles();
    }, 1000);
  }, 2000);
});

// ── PLAYER ───────────────────────────────────────────────────
var btn      = document.getElementById('playBtn');
var playIco  = document.getElementById('playIcon');
var pauseIco = document.getElementById('pauseIcon');
var audio    = document.getElementById('bgMusic');
var playing  = false;

var lines = ['lyr1','lyr2','lyr3','lyr4','lyr5','lyr6'];
var lyricInterval;

function startLyrics(){
  var idx = 0;
  lyricInterval = setInterval(function(){
    lines.forEach(function(id){ document.getElementById(id).style.opacity = 0; });
    document.getElementById(lines[idx]).style.opacity = 1;
    idx = (idx + 1) % lines.length;
  }, 3200);
}

function stopLyrics(){
  clearInterval(lyricInterval);
  lines.forEach(function(id){ document.getElementById(id).style.opacity = 0; });
  document.getElementById(lines[0]).style.opacity = 1;
}

btn.addEventListener('click', function(){
  if(playing){
    audio.pause();
    playIco.style.display  = 'block';
    pauseIco.style.display = 'none';
    stopLyrics();
  } else {
    audio.play();
    playIco.style.display  = 'none';
    pauseIco.style.display = 'block';
    startLyrics();
  }
  playing = !playing;
});
</script>
