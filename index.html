<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.8">
  <title>ansia – a's</title>
  <style>
    @import url('https://fonts.cdnfonts.com/css/allerta-stencil');
    :root{--glow:0 0 8px;}
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden;}
    body{
      display:flex;align-items:center;justify-content:center;
      background:#0a0a0a;color:#fff;
      font-family:'Evolve Sans',sans-serif;
    }

    /* ── INTRO ── */
    #intro{
      position:fixed;inset:0;z-index:999;
      background:#000;
      display:flex;align-items:center;justify-content:center;
      transition:opacity 1s ease;
    }
    #intro.fade-out{ opacity:0; pointer-events:none; }
    #starCanvas{ position:absolute;inset:0;width:100%;height:100%; filter:blur(2px); opacity:0.8; }

    /* ── BACKGROUND VIDEO ── */
    #borderVid{
      position:fixed;inset:0;width:100%;height:100%;
      object-fit:cover;opacity:.6;z-index:-2;
    }
    #overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.60);z-index:-1;
    }

    /* ── OUTER WRAPPER — no opacity on parent (it would multiply into children) ── */
    .card{
      width:360px;
      position:relative;
      text-align:center;
      transform:translateY(-60px);
      filter:blur(14px);
      visibility:hidden;
      pointer-events:none;
    }
    .card.revealed{
      transform:translateY(0);
      filter:blur(0);
      visibility:visible;
      pointer-events:auto;
      transition:transform .8s ease,filter .8s ease;
    }

    /* ── SLIDE ITEMS — animate their own opacity, always reach 1 ── */
    .slide-item{
      opacity:0;
      transform:translateY(-20px);
      filter:blur(6px);
      transition:opacity .6s ease,transform .6s ease,filter .6s ease;
      position:relative;z-index:1;
    }
    .card.revealed .slide-item{ opacity:1;transform:translateY(0);filter:blur(0); }
    .card.revealed .slide-item:nth-child(1){ transition-delay:.05s }
    .card.revealed .slide-item:nth-child(2){ transition-delay:.15s }
    .card.revealed .slide-item:nth-child(3){ transition-delay:.28s }
    .card.revealed .slide-item:nth-child(4){ transition-delay:.42s }
    .card.revealed .slide-item:nth-child(5){ transition-delay:.56s }
    .card.revealed .slide-item:nth-child(6){ transition-delay:.70s }
    .card.revealed .slide-item:nth-child(7){ transition-delay:.84s }

    /* ── BANNER — its own isolated rounded box ── */
    .banner{
      width:100%;
      height:155px;
      border-radius:16px;
      overflow:hidden;        /* clips gif inside rounded corners */
      position:relative;
    }
    .banner img{
      width:100%;height:100%;object-fit:cover;opacity:.85;
    }
    .banner::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:60px;
      background:linear-gradient(transparent,rgba(6,6,6,.88));
    }

    /* ── PLAY BTN — sits at top-left of banner ── */
    #playBtn{
      position:absolute;top:10px;left:12px;z-index:20;
      width:26px;height:26px;
      cursor:pointer;background:transparent;border:none;outline:none;padding:0;
    }
    #playBtn svg{
      width:100%;height:100%;display:block;fill:#fff;
      animation:glowWhite 2.5s ease-in-out infinite;
    }

    /* ── PROFILE PIC — pulled UP with negative margin to overlap banner bottom ── */
    .gif-wrap{
      width:108px;height:108px;
      border-radius:50%;
      overflow:hidden;
      margin:-54px auto 0;   /* negative = half height → sits half inside banner */
      position:relative;
      z-index:10;            /* above banner */
      display:block;
    }
    .gif-wrap img{width:100%;height:100%;object-fit:cover;}

    /* ── CONTENT below profile ── */
    .card-body{
      padding:14px 28px 18px;
    }

    /* ── GLOW ANIM ── */
    .title,.icons a svg,#lyrics{
      animation:glowWhite 2.5s ease-in-out infinite;
    }
    @keyframes glowWhite{
      0%  {color:#fff;text-shadow:var(--glow) #fff;fill:#fff;filter:drop-shadow(0 0 4px #fff);}
      50% {color:#fff;text-shadow:0 0 14px #fff,0 0 28px #fff;fill:#fff;filter:drop-shadow(0 0 10px #fff);}
      100%{color:#fff;text-shadow:var(--glow) #fff;fill:#fff;filter:drop-shadow(0 0 4px #fff);}
    }

    .title{font-size:15px;font-weight:700;letter-spacing:.5px;margin-bottom:10px;}

    .star-wrap{
      display:flex;justify-content:center;align-items:center;
      margin-bottom:14px;height:28px;
    }
    .star{
      font-size:20px;line-height:1;color:#fff;
      animation:spinStar 4s linear infinite,glowStar 2.5s ease-in-out infinite;
      display:inline-block;transform-origin:center;
    }
    @keyframes spinStar{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    @keyframes glowStar{
      0%  {text-shadow:0 0 6px #fff,0 0 12px #fff;}
      50% {text-shadow:0 0 18px #fff,0 0 36px #fff,0 0 60px #fff;}
      100%{text-shadow:0 0 6px #fff,0 0 12px #fff;}
    }

    /* ── ICONS ── */
    .icons{display:flex;justify-content:center;gap:26px;margin-bottom:12px;}
    .icons a{display:flex;align-items:center;justify-content:center;text-decoration:none;}
    .icons a svg{
      width:24px;height:24px;fill:#fff;
      transition:transform .15s;
      animation:glowWhite 2.5s ease-in-out infinite;
    }
    .icons a:active svg{transform:scale(.88);}

    /* ── LYRICS ── */
    #lyrics{font-size:10px;font-weight:700;height:14px;position:relative;margin-top:4px;}
    #lyrics span{position:absolute;left:0;right:0;transition:opacity .4s;color:#fff;}
  </style>
</head>

<script>
/* ── SHOOTING STARS ── */
(function(){
  var canvas = document.getElementById('starCanvas');
  var ctx    = canvas.getContext('2d');
  var W, H;
  var stars  = [];
  var alive  = true;

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function makeStar(delayed){
    if(!W || !H) return null;
    var angle = 0.08 + Math.random() * 0.18;
    var speed = 10 + Math.random() * 16;
    return {
      x:        delayed ? -Math.random() * W * 0.5 : Math.random() * W * 1.3 - W * 0.15,
      y:        Math.random() * H * 0.65,
      vx:       Math.cos(angle) * speed,
      vy:       Math.sin(angle) * speed,
      angle:    angle,
      len:      100 + Math.random() * 200,
      width:    1.2 + Math.random() * 2,
      alpha:    0,
      maxAlpha: 0.65 + Math.random() * 0.35,
      fadingIn: true,
    };
  }

  window.addEventListener('resize', resize);
  resize();

  for(var i = 0; i < 10; i++){
    var s0 = makeStar(false); if(s0) stars.push(s0);
  }

  function draw(){
    if(!alive) return;
    ctx.clearRect(0, 0, W, H);

    if(Math.random() < 0.04 && stars.length < 14){
      var ns = makeStar(true); if(ns) stars.push(ns);
    }

    for(var i = stars.length - 1; i >= 0; i--){
      var s = stars[i];
      s.x += s.vx; s.y += s.vy;

      if(s.fadingIn){
        s.alpha += 0.045;
        if(s.alpha >= s.maxAlpha){ s.alpha = s.maxAlpha; s.fadingIn = false; }
      }
      if(s.x > W * 0.72){ s.alpha -= 0.028; }
      if(s.alpha <= 0 || s.x > W + 300){
        stars.splice(i, 1);
        var rs = makeStar(true); if(rs) stars.push(rs);
        continue;
      }

      var tx = s.x - Math.cos(s.angle) * s.len;
      var ty = s.y - Math.sin(s.angle) * s.len;
      if(!isFinite(tx)||!isFinite(ty)||!isFinite(s.x)||!isFinite(s.y)) continue;

      var grad = ctx.createLinearGradient(tx, ty, s.x, s.y);
      grad.addColorStop(0,   'rgba(255,210,40,0)');
      grad.addColorStop(0.5, 'rgba(255,210,40,'+(s.alpha*.35)+')');
      grad.addColorStop(0.85,'rgba(255,235,120,'+(s.alpha*.8)+')');
      grad.addColorStop(1,   'rgba(255,255,255,'+s.alpha+')');

      ctx.save();
      ctx.shadowColor='rgba(255,210,40,.9)';ctx.shadowBlur=12;
      ctx.strokeStyle=grad;ctx.lineWidth=s.width;
      ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(s.x,s.y);ctx.stroke();

      var hGrad=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.width*4);
      hGrad.addColorStop(0,'rgba(255,255,255,'+s.alpha+')');
      hGrad.addColorStop(0.4,'rgba(255,230,80,'+(s.alpha*.7)+')');
      hGrad.addColorStop(1,'rgba(255,200,30,0)');
      ctx.shadowBlur=20;ctx.shadowColor='rgba(255,220,50,1)';
      ctx.beginPath();ctx.arc(s.x,s.y,s.width*2.2,0,Math.PI*2);
      ctx.fillStyle=hGrad;ctx.fill();
      ctx.restore();
    }
    requestAnimationFrame(draw);
  }

  draw();
  window._stopStars = function(){ alive = false; };
})();

/* ── INTRO TIMER ── */
window.addEventListener('DOMContentLoaded', function(){
  var intro = document.getElementById('intro');
  var card  = document.getElementById('card');
  setTimeout(function(){
    intro.classList.add('fade-out');
    card.classList.add('revealed');
    setTimeout(function(){ intro.style.display='none'; window._stopStars(); }, 1000);
  }, 2800);
});

/* ── PLAYER ── */
var btn=document.getElementById('playBtn'),
    playIco=document.getElementById('playIcon'),
    pauseIco=document.getElementById('pauseIcon'),
    audio=document.getElementById('bgMusic'),
    playing=false,
    lines=['lyr1','lyr2','lyr3','lyr4','lyr5','lyr6'],
    lyricInterval;

function startLyrics(){
  var idx=0;
  lyricInterval=setInterval(function(){
    lines.forEach(function(id){document.getElementById(id).style.opacity=0;});
    document.getElementById(lines[idx]).style.opacity=1;
    idx=(idx+1)%lines.length;
  },3200);
}
function stopLyrics(){
  clearInterval(lyricInterval);
  lines.forEach(function(id){document.getElementById(id).style.opacity=0;});
  document.getElementById(lines[0]).style.opacity=1;
}
btn.addEventListener('click',function(){
  if(playing){audio.pause();playIco.style.display='block';pauseIco.style.display='none';stopLyrics();}
  else{audio.play();playIco.style.display='none';pauseIco.style.display='block';startLyrics();}
  playing=!playing;
});
</script>
