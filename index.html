<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ansia - a's blerh</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'JetBrains Mono',monospace;
      background:#0a0a0a;
      color:#fff;
      height:100vh;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center
    }

    /* fundo banner achatado */
    #bg{
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      object-fit:cover;
      object-position:50% 20%;
      z-index:-2
    }
    #overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      z-index:-1
    }

    /* borda externa na .card (fora do GIF) */
    .card{
      width:400px;
      text-align:center;
      padding:40px 30px;
      background:transparent;
      border:1px solid rgba(255,0,64,0.5);
      border-radius:12px;
    }

    /* profile sem borda */
    .gif-wrap{
      width:150px;
      height:150px;
      margin:0 auto 8px;
      border-radius:50%;
      overflow:hidden;
    }
    .gif-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* texto "ansia - a's" com RGB vermelho → rosa avermelhado → preto */
    .subtitle{
      font-size:15px;
      letter-spacing:1px;
      margin-bottom:15px;
      animation:rgb 2.5s linear infinite;
    }
    @keyframes rgb{
      0%   {color:#ff0040;text-shadow:0 0 8px #ff0040;}      /* vermelho */
      33%  {color:#e91e63;text-shadow:0 0 8px #e91e63;}      /* rosa avermelhado */
      66%  {color:#000;text-shadow:0 0 8px #000;}            /* preto */
      100% {color:#ff0040;text-shadow:0 0 8px #ff0040;}      /* vermelho */
    }

    /* ícones clicáveis abaixo */
    .icons{
      display:flex;
      justify-content:center;
      gap:25px;
    }
    .icons a svg{
      width:28px;
      height:28px;
      fill:#ff0040;
      filter:drop-shadow(0 0 4px #ff0040);
      transition:transform .15s, filter .15s;
    }
    .icons a:active svg{
      transform:scale(.88);
      filter:drop-shadow(0 0 2px #ff0040);
    }

    /* pontos caindo */
    .dot{
      position:fixed;
      top:-10px;
      width:4px;height:4px;
      background:#ff0040;
      border-radius:50%;
      animation:fall linear infinite;
    }
    @keyframes fall{
      to{transform:translateY(110vh)}
    }
  </style>
</head>
<body>

  <!-- GIF de fundo -->
  <img id="bg" src="https://i.imgur.com/Sb2YrpF.gif" alt="bg">
  <div id="overlay"></div>

  <script>
    (function createDots(){
      setInterval(()=>{
        const d=document.createElement('div');
        d.className='dot';
        d.style.left=Math.random()*100+'%';
        d.style.animationDuration=(Math.random()*3+1)+'s';
        document.body.appendChild(d);
        setTimeout(()=>d.remove(),4000);
      },120);
    })();
  </script>
