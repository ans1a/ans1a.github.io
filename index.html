<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ansia – a's</title>
  <style>
    /* ══════════════════════════════════════════════════
       RESET & CUSTOM PROPERTIES
    ══════════════════════════════════════════════════ */
    :root {
      --bg:           #080808;
      --card:         rgba(12,12,12,0.85);
      --glass:        rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.07);
      --text:         #ffffff;
      --text-dim:     rgba(255,255,255,0.48);
      --text-mute:    rgba(255,255,255,0.22);
      --radius:       18px;
      --sb-w:         60px;
      --rp-w:         216px;
      /* Social accent colors */
      --tiktok:  #00F2A0;
      --github:  #FF2D55;
      --insta:   #00A2FF;
      --lastfm:  #C724FF;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow-x:hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
      font-weight: 700;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ══ INTRO OVERLAY ══ */
    #intro {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,.82);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 1s ease;
    }
    #intro.fade-out { opacity: 0; pointer-events: none; }
    #sigilImg {
      width: 210px; max-width: 65vw;
      user-select: none; pointer-events: none;
      animation: breathe 2.6s ease-in-out infinite;
    }
    @keyframes breathe {
      0%   { opacity:.12; filter:brightness(.4) drop-shadow(0 0 6px rgba(255,255,255,.2)); }
      50%  { opacity:.95; filter:brightness(1.4) drop-shadow(0 0 36px #fff) drop-shadow(0 0 60px rgba(255,255,255,.4)); }
      100% { opacity:.12; filter:brightness(.4) drop-shadow(0 0 6px rgba(255,255,255,.2)); }
    }

    /* ══ BG GIF + OVERLAY ══ */
    #bgGif {
      position: fixed; inset:0; width:100%; height:100%;
      object-fit: cover; opacity:.44; z-index:-2; pointer-events:none;
    }
    #overlay {
      position: fixed; inset:0;
      background: rgba(0,0,0,.38); z-index:-1; pointer-events:none;
    }

    /* ══════════════════════════════════════════════════
       DASHBOARD GRID  — sidebar | main | right-panel
    ══════════════════════════════════════════════════ */
    .dashboard {
      display: grid;
      grid-template-columns: var(--sb-w) 1fr var(--rp-w);
      gap: 10px;
      max-width: 1080px;
      margin: 0 auto;
      padding: 18px 14px 28px;
      min-height: 100vh;
      align-items: start;
      /* intro reveal state */
      opacity: 0; transform: translateY(-36px); filter: blur(12px);
      visibility: hidden; pointer-events: none;
      transition: opacity .85s ease, transform .85s ease, filter .85s ease;
    }
    .dashboard.revealed {
      opacity:1; transform:translateY(0); filter:blur(0);
      visibility:visible; pointer-events:auto;
    }

    /* ══ GLASS MIXIN (applied via shared class) ══ */
    .glass {
      background: rgba(8,8,8,0.45);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
    }

    /* ══════════════════════════════════════════════════
       LEFT SIDEBAR
    ══════════════════════════════════════════════════ */
    .sidebar {
      display: flex; flex-direction: column; align-items: center;
      padding: 14px 0 12px;
      gap: 4px;
      position: sticky; top: 18px;
    }
    .sb-icon {
      width: 40px; height: 40px;
      display: flex; align-items:center; justify-content:center;
      border-radius: 11px; cursor: pointer;
      color: var(--text-dim); text-decoration: none;
      transition: background .15s, color .15s;
    }
    .sb-icon:hover  { background: var(--glass); color: var(--text); }
    .sb-icon.active { background: rgba(255,255,255,.08); color: var(--text); }
    .sb-icon svg    { width:18px; height:18px; fill:currentColor; }
    .sb-div { width:22px; height:1px; background:var(--glass-border); margin:6px 0; }
    .sb-label {
      font-size: 7.5px; font-weight: 900; letter-spacing: 1.2px;
      color: var(--text-mute); text-transform: uppercase;
      margin-top: auto; padding-top: 14px;
      writing-mode: vertical-lr; transform: rotate(180deg);
    }

    /* ══════════════════════════════════════════════════
       MAIN CONTENT COLUMN
    ══════════════════════════════════════════════════ */
    .main-col {
      display: flex; flex-direction: column; gap: 10px; min-width:0;
    }

    /* ── TOP NAV BAR ── */
    .top-nav {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 14px;
    }
    .nav-search {
      flex: 1; display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 11px;
      background: var(--glass); border: 1px solid var(--glass-border);
      color: var(--text-mute); font-size: 11.5px; font-weight: 600;
    }
    .nav-search svg { width:13px; height:13px; fill:var(--text-mute); flex-shrink:0; }
    .nav-brand {
      font-size: 12px; font-weight: 900; letter-spacing: 2.5px;
      line-height: 1; text-align: center;
      background: linear-gradient(180deg,#fff,rgba(255,255,255,.5));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .nav-right { display:flex; align-items:center; gap:7px; }
    .nav-bell {
      width:33px; height:33px; display:flex; align-items:center; justify-content:center;
      border-radius:9px; background:var(--glass); border:1px solid var(--glass-border);
    }
    .nav-bell svg { width:13px; height:13px; fill:var(--text-dim); }
    /* Clicking the name redirects to #card (the dashboard top) */
    .nav-user {
      display:flex; align-items:center; gap:7px;
      padding: 4px 10px 4px 4px; border-radius:11px;
      background:var(--glass); border:1px solid var(--glass-border);
      text-decoration:none; color:var(--text); cursor:pointer;
    }
    .nav-user img { width:25px; height:25px; border-radius:50%; object-fit:cover; }
    .nav-user-name { font-size:11px; font-weight:800; letter-spacing:.3px; }
    .nav-badge {
      padding:6px 11px; border-radius:8px;
      background:rgba(255,255,255,.9); color:#000;
      font-size:11px; font-weight:900; letter-spacing:.3px;
      border:none; cursor:pointer;
      box-shadow:0 0 12px rgba(255,255,255,.22);
      transition:box-shadow .15s, transform .15s;
    }
    .nav-badge:hover { box-shadow:0 0 20px rgba(255,255,255,.44); transform:translateY(-1px); }

    /* ── HERO SECTION ── */
    /* Reference: print 2 — text top-left, lfm top-center (yellow circle), GIF center */
    .hero-section {
      position: relative; height: 296px;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset:0;
      width:100%; height:100%; object-fit:cover;
      opacity:.65; z-index:0; pointer-events:none;
    }
    .hero-overlay-fade {
      position:absolute; inset:0;
      background:linear-gradient(to bottom, rgba(0,0,0,.35) 0%, rgba(6,6,6,.75) 100%);
      z-index:1; pointer-events:none;
    }

    /* Play / volume controls pinned top-left of hero */
    #playBtn {
      position:absolute; top:12px; left:14px; z-index:20;
      width:26px; height:26px; cursor:pointer;
      background:transparent; border:none; outline:none; padding:0;
    }
    #playBtn svg { width:100%; height:100%; display:block; fill:#fff; animation:glowWhite 2.5s ease-in-out infinite; }
    #audioControls {
      position:absolute; top:14px; left:46px; right:14px; z-index:20;
      display:flex; align-items:center; gap:7px;
      opacity:0; pointer-events:none; transition:opacity .3s ease;
    }
    #audioControls.visible { opacity:.5; pointer-events:auto; }
    #volPct { font-size:8.5px; font-weight:800; color:rgba(255,255,255,.7); min-width:26px; text-align:right; }
    #volTrack { flex:1; height:3px; border-radius:2px; background:rgba(255,255,255,.18); position:relative; cursor:pointer; touch-action:none; }
    #volFill   { height:100%; border-radius:2px; background:rgba(255,255,255,.85); width:100%; transition:width .05s; pointer-events:none; }
    #volHandle { position:absolute; top:50%; right:0; width:9px; height:9px; border-radius:50%; background:#fff; transform:translate(50%,-50%); box-shadow:0 0 5px rgba(255,255,255,.5); pointer-events:none; }

    /* Laveyan text rotator — bottom-left of hero */
    .hero-text {
      position:absolute; bottom:18px; left:20px; z-index:10;
      display:flex; flex-direction:column; gap:6px; max-width:190px;
    }
    .hero-mot-pre  { font-size:17px; font-weight:800; color:#fff; line-height:1.2; }
    .hero-mot-pill {
      display:inline-block;
      background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.16);
      border-radius:20px; padding:4px 13px;
      font-size:13px; font-weight:700; color:#fff;
      max-width:190px; word-break:break-word;
      transition:opacity .25s ease;
    }
    #heroRotTxt { display:block; }

    /* Last.fm mini-player — TOP CENTER */
    .lfm-hero-card {
      position:absolute; top:12px; left:50%; transform:translateX(-50%);
      z-index:15; width:230px;
      background:rgba(6,6,6,.38);
      border:1px solid rgba(255,255,255,.15);
      border-radius:13px; padding:10px 12px;
      backdrop-filter:blur(50px); -webkit-backdrop-filter:blur(50px);
      overflow:hidden;
      transition: background .8s ease, border-color .8s ease;
    }
    /* Dynamic color overlay from album art */
    .lfm-hero-card::before {
      content:''; position:absolute; inset:0; z-index:0;
      background-image: var(--lfm-art-url, none);
      background-size:cover; background-position:center;
      filter:blur(24px) brightness(.35) saturate(2.5);
      transform:scale(1.4);
      opacity:1;
      transition: background-image .8s ease;
      border-radius:13px;
    }
    .lfm-h-row {
      display:flex; align-items:center; gap:9px; position:relative; z-index:1;
    }
    .lfm-h-art {
      width:38px; height:38px; border-radius:8px; flex-shrink:0;
      object-fit:cover; background:rgba(255,255,255,.06);
      box-shadow:0 3px 10px rgba(0,0,0,.6); transition:opacity .5s;
    }
    .lfm-h-art:not([src]),.lfm-h-art[src=""] { opacity:0; }
    .lfm-h-info { flex:1; min-width:0; }
    .lfm-h-track  { font-size:11.5px; font-weight:800; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lfm-h-artist { font-size:9.5px; font-weight:600; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lfm-h-badge  { display:flex; flex-direction:column; align-items:center; gap:3px; flex-shrink:0; }
    .lfm-h-dot {
      width:7px; height:7px; border-radius:50%;
      background:#C724FF; box-shadow:0 0 7px #C724FF;
      animation:lfmPulse 1.4s ease-in-out infinite;
    }
    .lfm-h-dot.idle { background:#444; box-shadow:none; animation:none; }
    .lfm-h-label { font-size:7px; font-weight:900; color:#C724FF; letter-spacing:.8px; text-transform:uppercase; }
    .lfm-h-label.idle { color:#444; }
    .lfm-h-foot {
      display:flex; align-items:center; gap:8px;
      margin-top:7px; padding-top:7px;
      border-top:1px solid rgba(255,255,255,.1);
      position:relative; z-index:1;
    }
    .lfm-h-av {
      width:20px; height:20px; border-radius:50%;
      object-fit:cover; background:rgba(255,255,255,.07); flex-shrink:0;
    }
    .lfm-h-uname { font-size:9.5px; font-weight:800; color:var(--text); flex:1; }
    .lfm-h-scr   { font-size:9px; font-weight:700; color:var(--text-dim); }

    /* Profile GIF — bottom-center of hero (replaces anime girl) */
    .hero-gif-wrap {
      position:absolute; bottom:0; left:50%; transform:translateX(-50%);
      z-index:12; width:176px; height:176px; border-radius:50% 50% 0 0;
      overflow:hidden;
      border:2px solid rgba(255,255,255,.1);
      box-shadow:0 0 28px rgba(255,255,255,.07), 0 -16px 40px rgba(0,0,0,.55);
    }
    .hero-gif-wrap img { width:100%; height:100%; object-fit:cover; }

    /* Title strip — bottom-center overlay */
    .hero-title-strip {
      position:absolute; bottom:14px; right:18px; z-index:14;
      text-align:right;
    }
    .hero-title-wrap { position:relative; display:inline-block; }
    .hero-title-glow {
      position:absolute; inset:0;
      font-size:13.5px; font-weight:700; letter-spacing:.6px; color:#fff;
      filter:blur(5px); animation:glowFade 4s linear infinite;
      pointer-events:none; user-select:none; z-index:0;
    }
    .hero-title {
      position:relative; z-index:1;
      font-size:13.5px; font-weight:700; letter-spacing:.6px;
      background:linear-gradient(90deg,#fff,#ddd,#888,#444,#888,#ddd,#fff,#fff);
      background-size:200% auto;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      animation:rainbowShift 4s linear infinite;
    }
    #sparkleCanvas {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:220px; height:60px; pointer-events:none; z-index:5;
    }

    /* ── BOTTOM SECTION: Laveyan lyrics + 4 social cards ── */
    .bottom-section { display:flex; flex-direction:column; gap:8px; }
    .sect-header {
      display:flex; align-items:center; gap:8px; padding:0 2px;
    }
    .sect-title { font-size:11.5px; font-weight:700; color:var(--text-dim); }
    .sect-badge {
      background:var(--glass); border:1px solid var(--glass-border);
      border-radius:6px; padding:2px 9px;
      font-size:10px; font-weight:800; color:var(--text);
    }
    /* Small social icon links row (top-right of section header) */
    .sect-icons { margin-left:auto; display:flex; gap:14px; }
    .sect-icons a { display:flex; align-items:center; }
    .sect-icons svg { width:15px; height:15px; fill:var(--text-dim); transition:fill .15s; animation:glowWhite 2.5s ease-in-out infinite; }
    .sect-icons a:hover svg { fill:#fff; }

    /* Laveyan lyrics small rotator */
    #lyrics { text-align:center; min-height:16px; padding:0 6px; }
    #lyrTxt {
      display:inline-block; opacity:0; transition:opacity .2s ease;
      font-size:10.5px; font-weight:700; letter-spacing:.4px;
      background:linear-gradient(90deg,#fff,#ddd,#888,#444,#888,#ddd,#fff,#fff);
      background-size:200% auto;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      animation:rainbowShift 4s linear infinite;
    }

    /* ══ 4 SOCIAL CARDS — horizontal grid ══ */
    .social-cards {
      display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
    }
    .scard {
      display:flex; flex-direction:column; gap:9px;
      padding:13px 11px;
      border-radius:14px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,.1);
      backdrop-filter:blur(50px) brightness(1.1); -webkit-backdrop-filter:blur(50px) brightness(1.1);
      text-decoration:none; color:#fff;
      position:relative; overflow:hidden;
      transition:background .2s, transform .2s, border-color .2s;
      cursor:pointer;
    }
    /* Colored accent top-border per platform */
    .scard::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      border-radius:14px 14px 0 0; opacity:.65; transition:opacity .2s;
    }
    .scard:hover::before { opacity:1; }
    .scard.tiktok::before { background:var(--tiktok); box-shadow:0 0 10px var(--tiktok); }
    .scard.github::before { background:var(--github); box-shadow:0 0 10px var(--github); }
    .scard.insta::before  { background:var(--insta);  box-shadow:0 0 10px var(--insta);  }
    .scard.lastfm::before { background:var(--lastfm); box-shadow:0 0 10px var(--lastfm); }
    .scard.tiktok:hover { background:rgba(0,242,160,.05);  border-color:rgba(0,242,160,.16);  transform:translateY(-2px); }
    .scard.github:hover { background:rgba(255,45,85,.05);  border-color:rgba(255,45,85,.16);  transform:translateY(-2px); }
    .scard.insta:hover  { background:rgba(0,162,255,.05);  border-color:rgba(0,162,255,.16);  transform:translateY(-2px); }
    .scard.lastfm:hover { background:rgba(199,36,255,.05); border-color:rgba(199,36,255,.16); transform:translateY(-2px); }
    .scard:active { transform:scale(.975); }

    /* blurred avatar bg */
    .scard-bg {
      position:absolute; inset:0;
      background-size:cover; background-position:center;
      filter:blur(30px) brightness(.08) saturate(1.5);
      transform:scale(1.4); z-index:0; border-radius:14px;
    }
    .scard-top {
      position:relative; z-index:1;
      display:flex; align-items:center; justify-content:space-between;
    }
    .scard-av {
      width:42px; height:42px; border-radius:50%; overflow:hidden;
      border:1.5px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.06); flex-shrink:0;
    }
    .scard-av img { width:100%; height:100%; object-fit:cover; display:block; transition:opacity .4s; }
    .scard-av img:not([src]),.scard-av img[src=""] { opacity:0; }
    .scard-ico { width:19px; height:19px; }
    .scard-ico svg { width:100%; height:100%; fill:rgba(255,255,255,.38); transition:fill .18s; }
    .scard:hover .scard-ico svg { fill:rgba(255,255,255,.82); }
    .scard-info { position:relative; z-index:1; }
    .scard-name {
      font-size:13px; font-weight:800; color:#fff;
      letter-spacing:.1px; line-height:1.2;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .scard-sub {
      font-size:10px; font-weight:600; color:var(--text-dim);
      letter-spacing:.2px; margin-top:2px;
    }
    /* Last.fm extended row */
    .scard-lfm-extra {
      position:relative; z-index:1;
      display:flex; align-items:center; gap:7px;
      padding-top:8px; border-top:1px solid rgba(255,255,255,.07);
    }
    .lfm-album-art {
      width:30px; height:30px; border-radius:5px; flex-shrink:0;
      object-fit:cover; background:rgba(255,255,255,.06); transition:opacity .5s;
    }
    .lfm-album-art:not([src]),.lfm-album-art[src=""] { opacity:0; }
    .lfm-track-info { flex:1; min-width:0; }
    .lfm-track-name   { font-size:10px; font-weight:800; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lfm-artist-name  { font-size:9px; font-weight:600; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lfm-dot { width:6px; height:6px; border-radius:50%; background:#C724FF; box-shadow:0 0 6px #C724FF; animation:lfmPulse 1.4s ease-in-out infinite; flex-shrink:0; }
    .lfm-dot.idle { background:#444; box-shadow:none; animation:none; }
    .lfm-badge-label { font-size:7.5px; font-weight:900; color:#C724FF; letter-spacing:.8px; text-transform:uppercase; }
    .lfm-badge-label.idle { color:#555; }

    /* ══════════════════════════════════════════════════
       RIGHT SIDEBAR
    ══════════════════════════════════════════════════ */
    .right-col { display:flex; flex-direction:column; gap:10px; min-width:0; }

    /* Habit-tracker style card */
    .tracker-card { padding:15px 13px; display:flex; flex-direction:column; gap:11px; }
    .tc-head { display:flex; align-items:center; justify-content:space-between; }
    .tc-title { font-size:13px; font-weight:900; color:#fff; }
    .tc-badge {
      background:var(--glass); border:1px solid var(--glass-border);
      border-radius:6px; padding:2px 8px;
      font-size:9.5px; font-weight:800; color:var(--text-dim);
    }
    .tc-date { font-size:9px; font-weight:700; color:var(--text-mute); letter-spacing:.2px; }

    /* Discord presence inside tracker card */
    .dc-card {
      display:flex; align-items:center; gap:10px;
      padding:9px 11px; border-radius:12px; overflow:hidden; position:relative;
      background:var(--glass); border:1px solid var(--glass-border);
      backdrop-filter:blur(50px); -webkit-backdrop-filter:blur(50px);
    }
    #dcBanner {
      position:absolute; inset:0;
      background-size:cover; background-position:center;
      filter:blur(28px) brightness(.15) saturate(1.2);
      transform:scale(1.3); z-index:0; border-radius:12px;
    }
    .dc-avatar-wrap { position:relative; width:42px; height:42px; flex-shrink:0; z-index:1; }
    .dc-avatar-wrap img { width:42px; height:42px; border-radius:50%; object-fit:cover; }
    .dc-avatar-wrap img:not([src]),.dc-avatar-wrap img[src=""] { visibility:hidden; }
    .dc-dot {
      position:absolute; bottom:1px; right:1px;
      width:12px; height:12px; border-radius:50%;
      border:2.5px solid rgba(0,0,0,.7); background:#747f8d;
    }
    .dc-dot.online  { background:#23a55a; }
    .dc-dot.idle    { background:#0a0a0a; border-color:#0a0a0a; box-shadow:inset 4px -2px 0 0 #f0b132; }
    .dc-dot.dnd     { background:#f23f43; }
    .dc-dot.offline { background:#747f8d; }
    .dc-info { display:flex; flex-direction:column; gap:2px; z-index:1; }
    .dc-name { font-size:13px; font-weight:700; color:#fff; letter-spacing:.3px; }
    .dc-seen { font-size:9.5px; color:#666; }

    /* Tracker item rows */
    .tc-items { display:flex; flex-direction:column; gap:5px; }
    .tc-item {
      display:flex; align-items:center; gap:8px;
      padding:5px 8px; border-radius:8px;
      background:var(--glass); border:1px solid var(--glass-border);
      font-size:9.5px; font-weight:700; color:var(--text-dim);
    }
    .tc-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.18); flex-shrink:0; }
    .tc-dot.done { background:#00F2A0; box-shadow:0 0 5px #00F2A0; }
    .tc-dot.live { background:#C724FF; box-shadow:0 0 5px #C724FF; animation:lfmPulse 1.4s ease-in-out infinite; }

    /* Dark mode toggle (decorative — site is always dark) */
    .dm-toggle {
      display:flex; align-items:center; gap:9px;
      padding:8px 10px; border-radius:10px;
      background:var(--glass); border:1px solid var(--glass-border);
      font-size:9.5px; font-weight:800; color:var(--text-dim);
    }
    .dm-track {
      width:32px; height:16px; border-radius:8px;
      background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
      position:relative;
    }
    .dm-thumb {
      width:12px; height:12px; border-radius:50%;
      background:rgba(255,255,255,.8); position:absolute;
      right:2px; top:50%; transform:translateY(-50%);
      box-shadow:0 0 6px rgba(255,255,255,.4);
    }

    /* Sigil 3D spinner */
    .sigil-card { padding:10px 0 6px; display:flex; flex-direction:column; align-items:center; }
    .sigil-wrap {
      display:flex; justify-content:center; align-items:center;
      height:80px; perspective:340px; position:relative; width:100%;
    }
    #sigilCanvas {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:160px; height:160px; pointer-events:none; z-index:0;
    }
    .sigil-3d  { display:flex; align-items:center; justify-content:center; transform-style:preserve-3d; z-index:1; }
    .sigil-img {
      width:64px; height:auto; display:block;
      mix-blend-mode:screen; transform-style:preserve-3d;
      animation:spinY 3.6s linear infinite, sigilPulse 2.5s ease-in-out infinite;
    }
    @keyframes spinY    { from{transform:rotateY(0deg)} to{transform:rotateY(360deg)} }
    @keyframes sigilPulse {
      0%,100% { filter:invert(1) brightness(30) drop-shadow(0 0 3px #fff); }
      50%     { filter:invert(1) brightness(30) drop-shadow(0 0 14px #fff) drop-shadow(0 0 28px rgba(255,255,255,.4)); }
    }

    /* Performance card */
    .perf-card { padding:14px 13px; display:flex; flex-direction:column; gap:8px; }
    .perf-label { font-size:10px; font-weight:800; color:var(--text-dim); letter-spacing:.3px; }
    .perf-bar { width:100%; height:4px; border-radius:2px; background:rgba(255,255,255,.08); }
    .perf-fill { height:100%; border-radius:2px; background:rgba(255,255,255,.8); width:40%; transition:width .6s ease; }
    .perf-nums { font-size:26px; font-weight:900; color:#fff; line-height:1; display:flex; align-items:baseline; gap:3px; }
    .perf-total { font-size:14px; color:var(--text-dim); }
    .perf-sub { font-size:8.5px; color:var(--text-mute); font-weight:700; letter-spacing:.4px; }

    /* ══ ANIMATIONS ══ */
    @keyframes glowWhite {
      0%   { fill:#fff; filter:drop-shadow(0 0 4px #fff); }
      50%  { fill:#fff; filter:drop-shadow(0 0 10px #fff); }
      100% { fill:#fff; filter:drop-shadow(0 0 4px #fff); }
    }
    @keyframes glowFade {
      0%,100% { opacity:.9; }
      50%     { opacity:.1; }
    }
    @keyframes rainbowShift {
      0%   { background-position:0% center; }
      100% { background-position:200% center; }
    }
    @keyframes lfmPulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%     { opacity:.3; transform:scale(.5); }
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width:900px) {
      .dashboard {
        grid-template-columns:1fr;
        padding:10px 8px 24px;
      }
      .sidebar {
        flex-direction:row; height:auto; width:100%;
        padding:10px 14px; position:static;
        justify-content:center;
      }
      .sb-div { width:1px; height:22px; margin:0 6px; }
      .sb-label { display:none; }
      .right-col { order:2; }
      .social-cards { grid-template-columns:repeat(2,1fr); }
      .hero-section { height:260px; }
      .hero-gif-wrap { width:148px; height:148px; }
      .lfm-hero-card { width:200px; }
    }
    @media (max-width:500px) {
      .social-cards { grid-template-columns:1fr; }
      .hero-section { height:240px; }
      .lfm-hero-card { width:calc(100% - 40px); }
      .hero-text { max-width:140px; }
    }
  </style>

window.addEventListener('DOMContentLoaded', function() {
  // Tracker date
  var d = new Date();
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var el = document.getElementById('trackerDate');
  if (el) el.textContent = 'Today, ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();

  // Time-of-day label (manhã/tarde/noite) based on local time + AM/PM detection via locale
  function updateTimeOfDay(date) {
    var h = date.getHours();
    var min = date.getMinutes();
    var uses12h = false;
    try {
      var testFmt = new Intl.DateTimeFormat(navigator.language, {hour:'numeric'}).format(new Date(2000,0,1,13));
      uses12h = /pm|am/i.test(testFmt);
    } catch(e) {}

    var label, badge;
    if (h >= 5 && h < 12) {
      label = uses12h ? 'Morning' : 'Manhã';
    } else if (h >= 12 && h < 18) {
      label = uses12h ? 'Afternoon' : 'Tarde';
    } else {
      label = uses12h ? 'Night' : 'Noite';
    }

    if (uses12h) {
      var hh = h % 12 || 12;
      var mm = (min < 10 ? '0' : '') + min;
      badge = hh + ':' + mm + ' ' + (h < 12 ? 'AM' : 'PM');
    } else {
      var hh2 = (h < 10 ? '0' : '') + h;
      var mm2 = (min < 10 ? '0' : '') + min;
      badge = hh2 + ':' + mm2;
    }

    var lbl = document.getElementById('timeOfDayLabel');
    var bdg = document.getElementById('timeOfDayBadge');
    if (lbl) lbl.textContent = label;
    if (bdg) bdg.textContent = badge;
  }

  // Try to get timezone from IP first, fall back to local
  fetch('https://ipapi.co/json/')
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var tz = data.timezone;
      if (tz) {
        var now = new Date(new Date().toLocaleString('en-US', {timeZone: tz}));
        updateTimeOfDay(now);
      } else {
        updateTimeOfDay(new Date());
      }
    })
    .catch(function() {
      updateTimeOfDay(new Date());
    });

  // Update every minute
  setInterval(function() { updateTimeOfDay(new Date()); }, 60000);

  var intro = document.getElementById('intro');
  var card  = document.getElementById('card');
  setTimeout(function() {
    intro.classList.add('fade-out');
    card.classList.add('revealed');
    setTimeout(function() { intro.style.display = 'none'; }, 1000);
    if (typeof startLyricsAuto === 'function') startLyricsAuto();
  }, 2800);
});

════════════════════════════════════════════════ */
(function() {
  var sc = document.getElementById('sparkleCanvas');
  if (!sc) return;
  var ctx = sc.getContext('2d');
  var W = sc.width = 220, H = sc.height = 60;
  var sparks = [], CYCLE = 4000;
  var COLORS = ['#ffffff','#cccccc','#999999','#555555','#222222','#555555','#cccccc'];
  function rainbowColor(o){ var t=((Date.now()%CYCLE)/CYCLE+o)%1; return COLORS[Math.floor(t*COLORS.length)%COLORS.length]; }
  function Spark(){ var a=Math.random()*Math.PI*2,r=24+Math.random()*48; this.x=W/2+Math.cos(a)*r; this.y=H/2+Math.sin(a)*r*.42; this.vx=(Math.random()-.5)*1.1; this.vy=(Math.random()-.5)*1.1; this.size=1.8+Math.random()*2.8; this.alpha=.75+Math.random()*.25; this.decay=.011+Math.random()*.016; this.rot=Math.random()*Math.PI; this.rotV=(Math.random()-.5)*.16; this.phase=Math.random(); }
  function drawStar(x,y,size,rot,alpha,color){ ctx.save(); ctx.globalAlpha=alpha; ctx.translate(x,y); ctx.rotate(rot); ctx.shadowColor=color; ctx.shadowBlur=8; ctx.fillStyle=color; ctx.beginPath(); for(var i=0;i<4;i++){var a=i*Math.PI/2,r1=size,r2=size*.28; ctx.lineTo(Math.cos(a)*r1,Math.sin(a)*r1); ctx.lineTo(Math.cos(a+Math.PI/4)*r2,Math.sin(a+Math.PI/4)*r2);} ctx.closePath(); ctx.fill(); ctx.restore(); }
  function loop(){ ctx.clearRect(0,0,W,H); if(sparks.length<22) sparks.push(new Spark()); for(var i=sparks.length-1;i>=0;i--){var s=sparks[i]; s.x+=s.vx; s.y+=s.vy; s.alpha-=s.decay; s.rot+=s.rotV; if(s.alpha<=0){sparks.splice(i,1);continue;} drawStar(s.x,s.y,s.size,s.rot,s.alpha,rainbowColor(s.phase));} requestAnimationFrame(loop); }
  loop();
})();

  function drawStar(x,y,size,rot,alpha,color){ ctx.save(); ctx.globalAlpha=alpha; ctx.translate(x,y); ctx.rotate(rot); ctx.shadowColor=color; ctx.shadowBlur=8; ctx.fillStyle=color; ctx.beginPath(); for(var i=0;i<4;i++){var a=i*Math.PI/2,r1=size,r2=size*.28; ctx.lineTo(Math.cos(a)*r1,Math.sin(a)*r1); ctx.lineTo(Math.cos(a+Math.PI/4)*r2,Math.sin(a+Math.PI/4)*r2);} ctx.closePath(); ctx.fill(); ctx.restore(); }
  function loop(){ ctx.clearRect(0,0,W,H); if(sparks.length<26) sparks.push(new Spark()); for(var i=sparks.length-1;i>=0;i--){var s=sparks[i]; s.x+=s.vx; s.y+=s.vy; s.alpha-=s.decay; s.rot+=s.rotV; if(s.alpha<=0){sparks.splice(i,1);continue;} drawStar(s.x,s.y,s.size,s.rot,s.alpha,rainbowColor(s.phase));} requestAnimationFrame(loop); }

/* ════════════════════════════════════════════════
   DISCORD PRESENCE (Lanyard WebSocket)
════════════════════════════════════════════════ */
(function() {
  var DISCORD_ID = '1422064240902013009';
  var WS_URL  = 'wss://api.lanyard.rest/socket';
  var REST_URL = 'https://api.lanyard.rest/v1/users/' + DISCORD_ID;
  var ws, hbInterval, _lastOnline = null, _seenTimer = null;
  function _fmtSeen(ms) { var d=Math.floor((Date.now()-ms)/1000); if(d<60)return 'visto agora mesmo'; if(d<3600)return 'visto '+Math.floor(d/60)+'m atrás'; if(d<86400)return 'visto '+Math.floor(d/3600)+'h atrás'; return 'visto '+Math.floor(d/86400)+'d atrás'; }
  function _updateSeenLabel() { var el=document.getElementById('dcSeen'); if(!el)return; var dot=document.getElementById('dcDot'); var isOnline=dot&&dot.className.indexOf('offline')===-1; if(isOnline){el.textContent='';}else if(_lastOnline){el.textContent=_fmtSeen(_lastOnline);}else{el.textContent='último acesso desconhecido';} }
  function applyPresence(data) {
    var dot=document.getElementById('dcDot'), avatarEl=document.getElementById('dcAvatar');
    if(!dot)return;
    var s=data.discord_status||'offline'; dot.className='dc-dot '+s;
    if(s!=='offline'){_lastOnline=Date.now();clearInterval(_seenTimer);_seenTimer=setInterval(_updateSeenLabel,30000);}
    _updateSeenLabel();
    if(data.discord_user&&data.discord_user.avatar){var uid=data.discord_user.id,av=data.discord_user.avatar,ext=av.startsWith('a_')?'gif':'png'; avatarEl.src='https://cdn.discordapp.com/avatars/'+uid+'/'+av+'.'+ext+'?size=80';}
  }
  function connectWS() {
    ws=new WebSocket(WS_URL);
    ws.onmessage=function(e){var msg=JSON.parse(e.data); if(msg.op===1){hbInterval=setInterval(function(){if(ws.readyState===1)ws.send(JSON.stringify({op:3}));},msg.d.heartbeat_interval);ws.send(JSON.stringify({op:2,d:{subscribe_to_id:DISCORD_ID}}));} if(msg.op===0&&(msg.t==='INIT_STATE'||msg.t==='PRESENCE_UPDATE')){var p=msg.d[DISCORD_ID]||msg.d;if(p)applyPresence(p);}};
    ws.onclose=function(){clearInterval(hbInterval);setTimeout(connectWS,5000);};
  }
  fetch(REST_URL).then(function(r){return r.json();}).then(function(j){if(j.data)applyPresence(j.data);}).catch(function(){});
  if(DISCORD_ID!=='SEU_ID_AQUI') connectWS();
})();

/* ════════════════════════════════════════════════

(function() {
  var btn=document.getElementById('playBtn'),

      pauseIco=document.getElementById('pauseIcon'),
      audio=document.getElementById('bgMusic'),
      volTrack=document.getElementById('volTrack'),
      volFill=document.getElementById('volFill'),
      volHandle=document.getElementById('volHandle'),
      volPct=document.getElementById('volPct');
  var dragging=false;
  function syncIcon(){var p=audio.paused; playIco.style.display=p?'block':'none'; pauseIco.style.display=!p?'block':'none';}
  audio.addEventListener('play',function(){syncIcon();document.getElementById('audioControls').classList.add('visible');});
  audio.addEventListener('pause',function(){syncIcon();document.getElementById('audioControls').classList.remove('visible');});
  audio.addEventListener('ended',function(){syncIcon();document.getElementById('audioControls').classList.remove('visible');});
  btn.addEventListener('click',function(){if(audio.paused){var p=audio.play();if(p&&p.catch)p.catch(function(){});}else{audio.pause();}});
  function setVolume(r){r=Math.max(0,Math.min(1,r));audio.volume=r;var p=Math.round(r*100);volFill.style.width=p+'%';volHandle.style.left=p+'%';volPct.textContent=p+'%';}
  function ratioFromEvent(e){var rect=volTrack.getBoundingClientRect(),cx=e.touches?e.touches[0].clientX:e.clientX;return(cx-rect.left)/rect.width;}
  volTrack.addEventListener('mousedown',function(e){dragging=true;setVolume(ratioFromEvent(e));e.preventDefault();});
  document.addEventListener('mousemove',function(e){if(dragging)setVolume(ratioFromEvent(e));});
  document.addEventListener('mouseup',function(){dragging=false;});
  volTrack.addEventListener('touchstart',function(e){dragging=true;setVolume(ratioFromEvent(e));e.preventDefault();},{passive:false});
  document.addEventListener('touchmove',function(e){if(dragging)setVolume(ratioFromEvent(e));},{passive:true});
  document.addEventListener('touchend',function(){dragging=false;});
  setVolume(1);
})();

  var PERF_TARGET = 30000;

  /* ── Tracker sidebar dot ── */
  var tcDot  = document.getElementById('lfm-tc-dot');
  var tcText = document.getElementById('lfm-tc-text');

  /* Load user info once */
  function loadUserInfo() {
    var url = 'https://ws.audioscrobbler.com/2.0/'
      + '?method=user.getinfo'
      + '&user='    + encodeURIComponent(LFM_USER)
      + '&api_key=' + encodeURIComponent(LFM_KEY)
      + '&format=json';
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data) {
        if (!data.user) return;
        var u = data.user;
        /* username */
        if (userNameEl && u.name) userNameEl.textContent = u.name;
        if (hUname     && u.name) hUname.textContent     = u.name;
        /* scrobble count */
        if (u.playcount) {
          var n = parseInt(u.playcount, 10);
          var fmt = n.toLocaleString('pt-BR');
          if (scrobEl)  scrobEl.textContent  = fmt + ' scrobbles';
          if (hScr)     hScr.textContent     = fmt + ' scrobbles';
          if (perfCur)  perfCur.textContent  = fmt;
          /* performance bar fill */
          if (perfFill) {
            var pct = Math.min(100, Math.round((n / PERF_TARGET) * 100));
            perfFill.style.width = pct + '%';
          }
        }
        /* profile avatar */
        var imgs = u.image || [], src = '';
        for (var i = imgs.length - 1; i >= 0; i--) {
          if (imgs[i]['#text'] && imgs[i]['#text'].indexOf('2a96cbd8') === -1) {
            src = imgs[i]['#text']; break;
          }
        }
        if (src) {
          if (profAvEl) profAvEl.src = src;
          if (hAv)      hAv.src = src;
        }
      })
      .catch(function(){});
  }

  /* Poll recent tracks */
  function pollNowPlaying() {
    var url = 'https://ws.audioscrobbler.com/2.0/'
      + '?method=user.getrecenttracks'
      + '&user='    + encodeURIComponent(LFM_USER)
      + '&api_key=' + encodeURIComponent(LFM_KEY)
      + '&format=json&limit=1';
    fetch(url)
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(data) {
        if (data.error || !data.recenttracks) { setIdle(); return; }
        var tracks = data.recenttracks.track;
        if (!tracks) { setIdle(); return; }
        var t = Array.isArray(tracks) ? tracks[0] : tracks;
        var nowPlaying = !!(t['@attr'] && t['@attr']['nowplaying'] === 'true');
        var name   = t.name   || '—';
        var artist = (t.artist && t.artist['#text']) || '';
        var key    = name + '|' + artist;

        /* update text in both locations */
        if (trackEl)  trackEl.textContent  = name;
        if (artistEl) artistEl.textContent = artist;
        if (hTrack)   hTrack.textContent   = name;
        if (hArtist)  hArtist.textContent  = artist;

        /* update live/idle state */
        if (nowPlaying) {
          if (dotEl)   dotEl.className   = 'lfm-dot';
          if (labelEl) { labelEl.className = 'lfm-badge-label'; labelEl.textContent = 'LIVE'; }
          if (hDot)    hDot.className    = 'lfm-h-dot';
          if (hLabel)  { hLabel.className = 'lfm-h-label'; hLabel.textContent = 'LIVE'; }
          if (tcDot)   tcDot.className   = 'tc-dot live';
          if (tcText)  tcText.textContent = 'Last.fm: ' + name.substring(0,18);
        } else {
          if (dotEl)   dotEl.className   = 'lfm-dot idle';
          if (labelEl) { labelEl.className = 'lfm-badge-label idle'; labelEl.textContent = 'LAST'; }
          if (hDot)    hDot.className    = 'lfm-h-dot idle';
          if (hLabel)  { hLabel.className = 'lfm-h-label idle'; hLabel.textContent = 'LAST'; }
          if (tcDot)   tcDot.className   = 'tc-dot';
          if (tcText)  tcText.textContent = 'Last.fm: ' + name.substring(0,18);
        }

        /* artwork — only update if track changed */
        if (key !== _lastTrackKey) {
          _lastTrackKey = key;
          var imgs = t.image || [], art = '';
          for (var i = imgs.length - 1; i >= 0; i--) {
            var u2 = imgs[i]['#text'];
            if (u2 && u2.indexOf('2a96cbd8') === -1) { art = u2; break; }
          }
          if (artEl) { artEl.src = art ? art : ''; artEl.style.opacity = art ? '1' : '0'; }
          if (hArt)  { hArt.src  = art ? art : ''; hArt.style.opacity  = art ? '1' : '0'; }
          /* dynamic color on hero player based on album art */
          var heroCard = document.querySelector('.lfm-hero-card');
          if (heroCard && art) {
            heroCard.style.setProperty('--lfm-art-url', 'url(' + art + ')');
          }
          /* blurred card bg */
          var bg = document.getElementById('lfm-card-bg');
          if (bg && art && !(profAvEl && profAvEl.src)) bg.style.backgroundImage = 'url(' + art + ')';
        }
      })
      .catch(function(){ setIdle(); });

    setTimeout(pollNowPlaying, POLL_MS);
  }

  function setIdle() {
    if (dotEl)   dotEl.className   = 'lfm-dot idle';
    if (labelEl) { labelEl.className = 'lfm-badge-label idle'; labelEl.textContent = 'LAST'; }
    if (hDot)    hDot.className    = 'lfm-h-dot idle';
    if (hLabel)  { hLabel.className = 'lfm-h-label idle'; hLabel.textContent = 'LAST'; }
    if (trackEl  && !trackEl.textContent)  trackEl.textContent  = '—';
    if (artistEl && !artistEl.textContent) artistEl.textContent = '—';
    if (hTrack   && !hTrack.textContent)   hTrack.textContent   = '—';
    if (hArtist  && !hArtist.textContent)  hArtist.textContent  = '—';
  }

  loadUserInfo();
  pollNowPlaying();
})();
</script>
</body>
</html>
