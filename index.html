<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ansia – a's</title>
  <style>
    /* ══════════════════════════════════════════════════
       RESET & CUSTOM PROPERTIES
    ══════════════════════════════════════════════════ */
    :root {
      --bg:           #080808;
      --card:         rgba(12,12,12,0.85);
      --glass:        rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.18);
      --text:         #ffffff;
      --text-dim:     rgba(255,255,255,0.65);
      --text-mute:    rgba(255,255,255,0.35);
      --radius:       20px;
      --radius-sm:    14px;
      --sb-w:         74px;
      --rp-w:         230px;
      --blur:         6px;
      --blur-heavy:   12px;
      --glass-bg:     rgba(255,255,255,0.23);
      --glass-bg-hover: rgba(255,255,255,0.28);
      --glass-shine:  rgba(255,255,255,0.24);
      --shadow-card:  0 6px 32px rgba(0,0,0,0.32), 0 1px 0 rgba(255,255,255,0.08) inset;
      --shadow-hover: 0 12px 40px rgba(0,0,0,0.40), 0 1px 0 rgba(255,255,255,0.14) inset;
      --accent-c1:    #ffffff;
      --accent-c2:    #888888;
      --accent-c3:    #555555;
      --accent-glow:  rgba(255,255,255,0.55);
      --dyn-border-a: rgba(255,255,255,0.18);
      --dyn-border-b: rgba(255,255,255,0.14);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html {
      background: #0a0a0a;
      scroll-behavior: smooth;
      overscroll-behavior-y: contain;
    }
    html, body { height:100%; overflow-x:hidden; }
    body {
      background: #0a0a0a url('https://raw.githubusercontent.com/ans1a/ans1a.github.io/refs/heads/main/bgp.gif') center/cover fixed;
      color: var(--text);
      font-family: -apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
      font-weight: 700;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
      -webkit-overflow-scrolling: touch;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.30);
      z-index: 0; pointer-events: none;
    }

    /* ══ INTRO OVERLAY ══ */
    #intro {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.82);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 1s ease;
    }
    #intro.fade-out { opacity: 0; pointer-events: none; }
    #sigilImg {
      width: 180px; max-width: 60vw;
      user-select: none; pointer-events: none;
      animation: breathe 2.6s ease-in-out infinite;
    }
    @keyframes breathe {
      0%   { opacity:.10; filter:brightness(.4) drop-shadow(0 0 6px rgba(255,255,255,.2)); }
      50%  { opacity:.92; filter:brightness(1.4) drop-shadow(0 0 36px #fff) drop-shadow(0 0 60px rgba(255,255,255,.4)); }
      100% { opacity:.10; filter:brightness(.4) drop-shadow(0 0 6px rgba(255,255,255,.2)); }
    }

    #bgGif  { display: none; }
    #overlay { display: none; }

    /* ══════════════════════════════════════════════════
       HEARTBEAT GLOW — brightness pulse ±20%
       Double-beat (lub-dub) every 2s
    ══════════════════════════════════════════════════ */
    @keyframes textGlowPulse {
      0%   { color: rgba(255,255,255,0.72); text-shadow: 0 0 4px rgba(255,255,255,0.18); }
      /* --- lub --- */
      12%  { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.95), 0 0 18px rgba(255,255,255,0.50), 0 0 34px rgba(255,255,255,0.22); }
      19%  { color: rgba(255,255,255,0.58); text-shadow: none; }
      /* --- dub --- */
      26%  { color: rgba(255,255,255,0.90); text-shadow: 0 0 6px rgba(255,255,255,0.75), 0 0 14px rgba(255,255,255,0.35); }
      34%  { color: rgba(255,255,255,0.68); text-shadow: 0 0 3px rgba(255,255,255,0.12); }
      /* --- rest --- */
      100% { color: rgba(255,255,255,0.72); text-shadow: 0 0 4px rgba(255,255,255,0.18); }
    }

    /* Apply heartbeat glow to all target text */
    .scard-name, .scard-sub, .lfm-h-track, .lfm-h-artist,
    .lfm-h-uname, .lfm-h-scr, .tc-title, .dc-name,
    .perf-nums > span:first-child, .nav-user-name, .tc-badge,
    .lfm-badge-label, .lfm-h-label, #lyrTxt,
    .lfm-modal-title, .lfm-modal-artist, .hero-title,
    .nav-brand {
      color: rgba(255,255,255,0.78);
      animation: textGlowPulse 2s ease-in-out infinite;
    }

    /* ══════════════════════════════════════════════════
       LIQUID GLASS — iOS-style premium glass
    ══════════════════════════════════════════════════ */
    .glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-shine);
      border-radius: var(--radius);
      backdrop-filter: blur(var(--blur-heavy)) saturate(1.4) brightness(1.02);
      -webkit-backdrop-filter: blur(var(--blur-heavy)) saturate(1.4) brightness(1.02);
      box-shadow: var(--shadow-card),
                  inset 0 1px 0 rgba(255,255,255,0.18),
                  inset 0 -1px 0 rgba(255,255,255,0.04);
    }

    /* ══════════════════════════════════════════════════
       DASHBOARD GRID
    ══════════════════════════════════════════════════ */
    .dashboard {
      display: grid;
      grid-template-columns: var(--sb-w) 1fr var(--rp-w);
      gap: 10px;
      max-width: min(96vw, 1080px);
      width: 92%;
      margin: 0 auto;
      padding: 14px 0 20px;
      min-height: auto;
      align-items: start;
      position: relative; z-index: 1;
      opacity: 0; transform: translateY(-18px) scale(0.992);
      visibility: hidden; pointer-events: none;
      transition: opacity .75s ease, transform .75s ease;
    }
    .dashboard.revealed {
      opacity:1; transform:translateY(0) scale(1);
      visibility:visible; pointer-events:auto;
    }

    /* ══════════════════════════════════════════════════
       LEFT SIDEBAR
    ══════════════════════════════════════════════════ */
    .sidebar {
      display: flex; flex-direction: column; align-items: center;
      padding: 14px 0 12px;
      gap: 4px;
      position: sticky; top: 14px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-shine);
      border-radius: var(--radius);
      backdrop-filter: blur(var(--blur-heavy)) saturate(1.4) brightness(1.02);
      -webkit-backdrop-filter: blur(var(--blur-heavy)) saturate(1.4) brightness(1.02);
      box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.18);
    }
    .sb-icon {
      width: 42px; height: 42px;
      display: flex; align-items:center; justify-content:center;
      border-radius: 12px; cursor: pointer;
      color: var(--text-dim); text-decoration: none;
      transition: background .15s, color .15s;
    }
    .sb-icon:hover  { background: rgba(255,255,255,0.10); color: var(--text); }
    .sb-icon.active { background: rgba(255,255,255,.12); color: var(--text); }
    .sb-icon svg    { width:18px; height:18px; fill:currentColor; }
    .sb-div { width:24px; height:1px; background:rgba(255,255,255,0.14); margin:5px 0; }
    .sb-label {
      font-size: 8px; font-weight: 900; letter-spacing: 1.2px;
      color: var(--text-mute); text-transform: uppercase;
      margin-top: auto; padding-top: 14px;
      writing-mode: vertical-lr; transform: rotate(180deg);
    }

    /* ══════════════════════════════════════════════════
       MAIN CONTENT COLUMN
    ══════════════════════════════════════════════════ */
    .main-col {
      display: flex; flex-direction: column; gap: 10px; min-width:0;
    }

    /* ── SOCIAL TABS BAR — OUTSIDE, ABOVE HERO ── */
    .social-tabs-bar {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px 18px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-shine);
      border-radius: 18px;
      backdrop-filter: blur(var(--blur-heavy)) saturate(1.4) brightness(1.02);
      -webkit-backdrop-filter: blur(var(--blur-heavy)) saturate(1.4) brightness(1.02);
      box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.16);
    }
    .social-tabs-bar .sect-tab {
      background: transparent; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 10px;
      transition: background .15s;
      padding: 0;
    }
    .social-tabs-bar .sect-tab svg {
      width: 17px; height: 17px; fill: var(--text-dim);
      transition: fill .15s;
      animation: glowWhite 2s ease-in-out infinite;
    }
    .social-tabs-bar .sect-tab:hover svg,
    .social-tabs-bar .sect-tab.active svg { fill: #fff; }
    .social-tabs-bar .sect-tab.active { background: rgba(255,255,255,.12); }

    /* ── HERO SECTION ── */
    .hero-section {
      position: relative; height: 280px;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--glass-shine);
      box-shadow: var(--shadow-card);
    }
    .hero-bg {
      position: absolute; inset:0;
      width:100%; height:100%; object-fit:cover;
      opacity:.60; z-index:0; pointer-events:none;
    }
    .hero-overlay-fade {
      position:absolute; inset:0;
      background:linear-gradient(to bottom, rgba(0,0,0,.08) 0%, rgba(6,6,6,.50) 100%);
      z-index:1; pointer-events:none;
    }

    /* Play / volume controls */
    #audioControls {
      position:absolute; top:12px; left:40px; right:12px; z-index:20;
      display:flex; align-items:center; gap:6px;
      opacity:0; pointer-events:none; transition:opacity .3s ease;
    }
    #audioControls.visible { opacity:.5; pointer-events:auto; }
    #volPct { font-size:8px; font-weight:800; color:rgba(255,255,255,.7); min-width:24px; text-align:right; }
    #volTrack { flex:1; height:3px; border-radius:2px; background:rgba(255,255,255,.18); position:relative; cursor:pointer; touch-action:none; }
    #volFill   { height:100%; border-radius:2px; background:rgba(255,255,255,.85); width:100%; transition:width .05s; pointer-events:none; }
    #volHandle { position:absolute; top:50%; right:0; width:8px; height:8px; border-radius:50%; background:#fff; transform:translate(50%,-50%); box-shadow:0 0 5px rgba(255,255,255,.5); pointer-events:none; }

    /* Last.fm mini-player standalone */
    .lfm-hero-card.lfm-standalone {
      position: static !important;
      transform: none !important;
      left: auto !important; top: auto !important;
      width: 100% !important;
      transition: transform .15s, box-shadow .15s;
    }
    .lfm-hero-card.lfm-standalone:hover {
      transform: translateY(-3px) !important;
      box-shadow: var(--shadow-hover);
    }
    .lfm-hero-card {
      position:absolute; top:10px; left:50%; transform:translateX(-50%);
      z-index:15; width:260px;
      background: var(--glass-bg);
      border:1px solid var(--glass-shine);
      border-radius: var(--radius-sm); padding:18px 18px;
      backdrop-filter:blur(var(--blur-heavy)) saturate(1.4) brightness(1.02);
      -webkit-backdrop-filter:blur(var(--blur-heavy)) saturate(1.4) brightness(1.02);
      overflow:hidden;
      box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.16);
      transition: background .8s ease, border-color .8s ease;
    }
    .lfm-hero-card::before { display: none; }
    .lfm-h-row {
      display:flex; align-items:center; gap:14px; position:relative; z-index:1;
    }
    .lfm-h-art {
      width:58px; height:58px; border-radius:10px; flex-shrink:0;
      object-fit:cover; background:rgba(255,255,255,.06);
      box-shadow:0 2px 10px rgba(0,0,0,.6); transition:opacity .5s;
    }
    .lfm-h-art:not([src]),.lfm-h-art[src=""] { opacity:0; }
    .lfm-h-info { flex:1; min-width:0; }
    .lfm-h-track  { font-size:15px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lfm-h-artist { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:3px; }
    .lfm-h-badge  { display:flex; flex-direction:column; align-items:center; gap:5px; flex-shrink:0; }
    .lfm-h-dot {
      width:10px; height:10px; border-radius:50%;
      background:#fff; box-shadow:0 0 10px #fff;
      animation:lfmPulse 2s ease-in-out infinite;
    }
    .lfm-h-dot.idle { background:#444; box-shadow:none; animation:none; }
    .lfm-h-label {
      font-size:9px; font-weight:900; letter-spacing:.8px; text-transform:uppercase;
    }
    .lfm-h-label.idle { color: #444 !important; text-shadow: none !important; animation: none !important; }
    .lfm-h-foot {
      display:flex; align-items:center; gap:10px;
      margin-top:12px; padding-top:12px;
      border-top:1px solid rgba(255,255,255,.10);
      position:relative; z-index:1;
    }
    .lfm-h-av {
      width:28px; height:28px; border-radius:50%;
      object-fit:cover; background:rgba(255,255,255,.07); flex-shrink:0;
    }
    .lfm-h-uname { font-size:13px; font-weight:800; flex:1; }
    .lfm-h-scr   { font-size:11px; font-weight:700; }

    /* Title strip — bottom-right overlay */
    .hero-title-strip {
      position:absolute; bottom:16px; right:20px; z-index:14;
      text-align:right;
    }
    .hero-title-wrap { position:relative; display:inline-block; }
    .hero-title-glow {
      position:absolute; inset:0;
      font-size:16px; font-weight:700; letter-spacing:.8px; color:#fff;
      filter:blur(5px); animation:glowFade 2s linear infinite;
      pointer-events:none; user-select:none; z-index:0;
    }
    .hero-title {
      position:relative; z-index:1;
      font-size:16px; font-weight:700; letter-spacing:.8px;
    }
    #sparkleCanvas {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:240px; height:60px; pointer-events:none; z-index:5;
    }

    /* Laveyan text rotator */
    .hero-text {
      position:absolute; bottom:18px; left:20px; z-index:10;
      display:flex; flex-direction:column; gap:6px; max-width:210px;
    }
    .hero-mot-pre  { font-size:18px; font-weight:800; color:#fff; line-height:1.2; }
    .hero-mot-pill {
      display:inline-block;
      background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.16);
      border-radius:20px; padding:4px 14px;
      font-size:13px; font-weight:700; color:#fff;
      max-width:210px; word-break:break-word;
      transition:opacity .25s ease;
    }
    #heroRotTxt { display:block; }

    /* ══ SIGIL ROW — below hero (moved from right col) ══ */
    .sigil-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
    }
    .sigil-wrap {
      display:flex; justify-content:center; align-items:center;
      height:130px; perspective:400px; position:relative; width:100%;
    }
    #sigilCanvas {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:240px; height:240px; pointer-events:none; z-index:0;
    }
    .sigil-3d  { display:flex; align-items:center; justify-content:center; transform-style:preserve-3d; z-index:1; }
    .sigil-img {
      width:96px; height:auto; display:block;
      mix-blend-mode:screen; transform-style:preserve-3d;
      animation: spinY 4s linear infinite, sigilPulse 2s ease-in-out infinite;
      animation-delay: 0s, 0s;
    }
    @keyframes spinY    { from{transform:rotateY(0deg)} to{transform:rotateY(360deg)} }
    @keyframes sigilPulse {
      0%,100% { filter:invert(1) brightness(30) drop-shadow(0 0 3px #fff); }
      50%     { filter:invert(1) brightness(30) drop-shadow(0 0 14px #fff) drop-shadow(0 0 28px rgba(255,255,255,.4)); }
    }

    /* Extra sigils */
    .sigil-extra {
      width: 62px; height: auto; display: block;
      mix-blend-mode: screen; transform-style: preserve-3d;
      filter: invert(1) brightness(30) drop-shadow(0 0 3px #fff);
      position: absolute; top: 50%; transform: translateY(-50%);
    }
    .sigil-extra.s1 { left: 0;    animation: spinY 4s linear infinite reverse, sigilPulse 2s ease-in-out infinite; animation-delay: 0s, 0s; }
    .sigil-extra.s2 { left: 26px; animation: spinY 4s linear infinite,         sigilPulse 2s ease-in-out infinite; animation-delay: 0s, 0s; opacity:.7; }
    .sigil-extra.s3 { right: 0;   animation: spinY 4s linear infinite,         sigilPulse 2s ease-in-out infinite; animation-delay: 0s, 0s; }
    .sigil-extra.s4 { right: 26px;animation: spinY 4s linear infinite reverse, sigilPulse 2s ease-in-out infinite; animation-delay: 0s, 0s; opacity:.7; }

    /* ── BOTTOM SECTION ── */
    .bottom-section { display:flex; flex-direction:column; gap:10px; }

    /* Laveyan lyrics */
    #lyrics { text-align:center; min-height:18px; padding:0 6px; }
    #lyrTxt {
      display:inline-block; opacity:0; transition:opacity .2s ease;
      font-size:12px; font-weight:700; letter-spacing:.4px;
    }

    /* ══ 4 SOCIAL CARDS ══ */
    .social-cards {
      display:grid; grid-template-columns:repeat(4,1fr); gap:10px;
    }
    .scard {
      display:flex; flex-direction:column; gap:16px;
      padding:22px 16px 20px;
      border-radius: var(--radius-sm);
      background: var(--glass-bg);
      border: 1px solid rgba(255,255,255,0.20);
      backdrop-filter: blur(var(--blur-heavy)) saturate(1.4) brightness(1.02);
      -webkit-backdrop-filter: blur(var(--blur-heavy)) saturate(1.4) brightness(1.02);
      box-shadow: var(--shadow-card),
                  inset 0 1px 0 rgba(255,255,255,0.18),
                  inset 0 -1px 0 rgba(255,255,255,0.04);
      text-decoration:none; color:#fff;
      position:relative; overflow:hidden;
      transition: background .2s, transform .18s, border-color .2s, box-shadow .2s;
      cursor:pointer;
    }
    /* B&W heartbeat top border */
    .scard::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      border-radius:14px 14px 0 0;
      background: linear-gradient(90deg, #fff, #555, #fff, #888, #fff);
      background-size: 400% auto;
      box-shadow: 0 0 8px rgba(255,255,255,0.45);
      animation: shiftBW 2s ease-in-out infinite;
    }
    @keyframes shiftBW {
      0%   { background-position: 0% center; }
      8%   { background-position: 100% center; }
      16%  { background-position: 0% center; }
      24%  { background-position: 100% center; }
      32%  { background-position: 0% center; }
      100% { background-position: 0% center; }
    }
    .scard:hover {
      background: var(--glass-bg-hover);
      border-color: rgba(255,255,255,0.28);
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover),
                  inset 0 1px 0 rgba(255,255,255,0.22);
    }
    .scard:active { transform:scale(.978); }

    .scard-bg { display: none; }
    .scard-top {
      position:relative; z-index:1;
      display:flex; align-items:center; justify-content:space-between;
    }
    .scard-av {
      width:64px; height:64px; border-radius:50%; overflow:hidden;
      border:1.5px solid rgba(255,255,255,.20);
      background:rgba(255,255,255,.06); flex-shrink:0;
    }
    .scard-av img { width:100%; height:100%; object-fit:cover; display:block; transition:opacity .4s; }
    .scard-av img:not([src]),.scard-av img[src=""] { opacity:0; }
    .scard-ico { width:24px; height:24px; }
    .scard-ico svg { width:100%; height:100%; fill:rgba(255,255,255,.38); transition:fill .18s; }
    .scard:hover .scard-ico svg { fill:rgba(255,255,255,.90); }
    .scard-info { position:relative; z-index:1; }
    .scard-name {
      font-size:16px; font-weight:800;
      letter-spacing:.1px; line-height:1.2;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .scard-sub {
      font-size:13px; font-weight:600;
      letter-spacing:.2px; margin-top:4px;
    }
    /* B&W heartbeat top border — all platforms uniform */
    .scard::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      border-radius:14px 14px 0 0;
      background: linear-gradient(90deg, #fff, #555, #fff, #888, #fff);
      background-size: 400% auto;
      box-shadow: 0 0 8px rgba(255,255,255,0.45);
      animation: shiftBW 2s ease-in-out infinite;
    }
    @keyframes shiftBW {
      0%   { background-position: 0% center; }
      8%   { background-position: 100% center; }
      16%  { background-position: 0% center; }
      24%  { background-position: 100% center; }
      32%  { background-position: 0% center; }
      100% { background-position: 0% center; }
    }
    /* ══ SECT TABS (layout compat) ══ */
    .sect-header { display:flex; align-items:center; gap:8px; padding:0 2px; }
    .sect-title { font-size:13px; font-weight:700; color:var(--text-dim); }
    .sect-badge {
      background:var(--glass); border:1px solid var(--glass-border);
      border-radius:6px; padding:3px 10px;
      font-size:11px; font-weight:800; color:var(--text);
    }
    .sect-tab {
      background: transparent; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 8px;
      transition: background .15s; padding: 0;
    }
    .sect-tab svg { width:14px; height:14px; fill:var(--text-dim); transition:fill .15s; animation:glowWhite 2s ease-in-out infinite; }
    .sect-tab:hover svg, .sect-tab.active svg { fill:#fff; }
    .sect-tab.active { background:rgba(255,255,255,.10); }

    /* ══════════════════════════════════════════════════
       RIGHT SIDEBAR
    ══════════════════════════════════════════════════ */
    .right-col { display:flex; flex-direction:column; gap:10px; min-width:0; }

    /* Habit-tracker card */
    .tracker-card { padding:20px 16px; display:flex; flex-direction:column; gap:13px; }
    .tc-head { display:flex; align-items:center; justify-content:space-between; }
    .tc-title { font-size:17px; font-weight:900; }
    .tc-badge {
      background:rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,0.22);
      border-radius:8px; padding:4px 11px;
      font-size:12px; font-weight:800;
    }
    .tc-date { font-size:11px; font-weight:700; color:var(--text-mute); letter-spacing:.2px; }

    /* Discord presence */
    .dc-card {
      display:flex; align-items:center; gap:12px;
      padding:14px 14px; border-radius: var(--radius-sm); overflow:hidden; position:relative;
      background: rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }
    #dcBanner { display: none; }
    .dc-avatar-wrap { position:relative; width:50px; height:50px; flex-shrink:0; z-index:1; }
    .dc-avatar-wrap img { width:50px; height:50px; border-radius:50%; object-fit:cover; }
    .dc-avatar-wrap img:not([src]),.dc-avatar-wrap img[src=""] { visibility:hidden; }
    .dc-dot {
      position:absolute; bottom:1px; right:1px;
      width:14px; height:14px; border-radius:50%;
      border:2px solid rgba(0,0,0,.7); background:#747f8d;
    }
    .dc-dot.online  { background:#23a55a; }
    .dc-dot.idle    { background:#0a0a0a; border-color:#0a0a0a; box-shadow:inset 3px -2px 0 0 #f0b132; }
    .dc-dot.dnd     { background:#f23f43; }
    .dc-dot.offline { background:#747f8d; }
    .dc-info { display:flex; flex-direction:column; gap:4px; z-index:1; }
    .dc-name { font-size:16px; font-weight:700; letter-spacing:.3px; }
    .dc-seen { font-size:12px; color:#666; }

    /* Tracker items */
    .tc-items { display:flex; flex-direction:column; gap:7px; }
    .tc-item {
      display:flex; align-items:center; gap:10px;
      padding:9px 13px; border-radius:11px;
      background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      font-size:12px; font-weight:700; color:var(--text-dim);
    }
    .tc-dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.18); flex-shrink:0; }
    .tc-dot.done { background:#fff; box-shadow:0 0 7px rgba(255,255,255,0.7); }
    .tc-dot.live { background:#fff; box-shadow:0 0 7px rgba(255,255,255,0.7); animation:lfmPulse 2s ease-in-out infinite; }

    /* Performance card */
    .perf-card { padding:18px 16px; display:flex; flex-direction:column; gap:10px; }
    .perf-label { font-size:13px; font-weight:800; color:var(--text-dim); letter-spacing:.3px; }
    .perf-bar { width:100%; height:4px; border-radius:3px; background:rgba(255,255,255,.08); }
    .perf-fill { height:100%; border-radius:3px; background:rgba(255,255,255,.85); width:40%; transition:width .6s ease; }
    .perf-nums { font-size:30px; font-weight:900; color:#fff; line-height:1; display:flex; align-items:baseline; gap:4px; }
    .perf-total { font-size:16px; color:var(--text-dim); }
    .perf-sub { font-size:11px; color:var(--text-mute); font-weight:700; letter-spacing:.4px; }

    /* ══ ANIMATIONS ══ */
    @keyframes glowWhite {
      0%   { fill:#fff; filter:drop-shadow(0 0 3px #fff); }
      50%  { fill:#fff; filter:drop-shadow(0 0 9px #fff); }
      100% { fill:#fff; filter:drop-shadow(0 0 3px #fff); }
    }
    @keyframes glowFade {
      0%,100% { opacity:.9; }
      50%     { opacity:.1; }
    }
    @keyframes lfmPulse {
      0%,100% { opacity:1; transform:scale(1); }
      8%      { opacity:.15; transform:scale(.5); }
      16%     { opacity:1; transform:scale(1); }
      24%     { opacity:.15; transform:scale(.5); }
      32%     { opacity:1; transform:scale(1); }
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width:900px) {
      :root { --sb-w: 54px; --rp-w: 200px; }
      .dashboard {
        gap: 8px;
        width: 95%;
      }
    }
    @media (max-width:820px) {
      .dashboard {
        grid-template-columns:1fr;
        padding:10px 0 18px;
        gap: 8px;
        width: 94%;
      }
      .sidebar {
        flex-direction:row; height:auto; width:100%;
        padding:10px 14px; position:static;
        justify-content:center;
      }
      .sb-div { width:1px; height:24px; margin:0 6px; }
      .sb-label { display:none; }
      .right-col { order:2; }
      .social-cards { grid-template-columns:repeat(2,1fr); }
      .hero-section { height:240px; }
    }
    @media (max-width:480px) {
      .social-cards { grid-template-columns:1fr; }
      .hero-section { height:200px; }
      .lfm-hero-card { width:calc(100% - 32px); }
      :root { --rp-w: 100%; }
    }

    /* ══ MUSIC MODAL ══ */
    .lfm-modal-overlay {
      position: fixed; inset: 0; z-index: 600;
      backdrop-filter: blur(20px) saturate(1.3); -webkit-backdrop-filter: blur(20px) saturate(1.3);
      background: rgba(0,0,0,0.40);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.28s ease;
    }
    .lfm-modal-overlay.open { opacity: 1; pointer-events: auto; }
    .lfm-modal-card {
      position: relative;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 20px;
      padding: 16px 14px 13px;
      width: 300px; max-width: 90vw;
      backdrop-filter: blur(var(--blur-heavy)) saturate(1.4) brightness(1.02);
      -webkit-backdrop-filter: blur(var(--blur-heavy)) saturate(1.4) brightness(1.02);
      box-shadow: 0 8px 48px rgba(0,0,0,0.30),
                  inset 0 1px 0 rgba(255,255,255,0.18);
      display: flex; flex-direction: column; gap: 8px;
    }
    .lfm-modal-close {
      position: absolute; top: 10px; right: 12px;
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      cursor: pointer; color: rgba(255,255,255,0.6);
      font-size: 11px; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .lfm-modal-close:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .lfm-modal-header {
      display: flex; align-items: center; gap: 6px; margin-bottom: 2px;
    }
    .lfm-modal-title {
      font-size: 8px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase;
    }
    .lfm-modal-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 11px;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 46px;
      background: rgba(255,255,255,0.03);
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      position: relative; overflow: hidden;
    }
    .lfm-modal-row:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.18);
      transform: translateX(2px);
    }
    .lfm-modal-ic {
      width: 22px; height: 22px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .lfm-modal-ic svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.70); }
    .lfm-modal-artist {
      font-size: 9.5px; font-weight: 800; flex-shrink: 0; white-space: nowrap;
      color: rgba(255,255,255,0.78);
      animation: textGlowPulse 2s ease-in-out infinite;
    }
    .lfm-modal-track {
      font-size: 9.5px; font-weight: 700;
      margin-left: auto; text-align: right; flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: rgba(255,255,255,0.70);
      animation: textGlowPulse 2s ease-in-out infinite reverse;
    }

    /* ══ LAST.FM BOTTOM CARD EXTRAS ══ */
    .scard-lfm-extra {
      position:relative; z-index:1;
      display:flex; align-items:center; gap:6px;
      padding-top:7px; border-top:1px solid rgba(255,255,255,.07);
    }
    .lfm-album-art {
      width:26px; height:26px; border-radius:4px; flex-shrink:0;
      object-fit:cover; background:rgba(255,255,255,.06); transition:opacity .5s;
    }
    .lfm-album-art:not([src]),.lfm-album-art[src=""] { opacity:0; }
    .lfm-track-info { flex:1; min-width:0; }
    .lfm-track-name   { font-size:9.5px; font-weight:800; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lfm-artist-name  { font-size:8.5px; font-weight:600; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lfm-dot { width:5px; height:5px; border-radius:50%; background:#fff; box-shadow:0 0 5px #fff; animation:lfmPulse 2s ease-in-out infinite; flex-shrink:0; }
    .lfm-dot.idle { background:#444; box-shadow:none; animation:none; }
    .lfm-badge-label { font-size:7px; font-weight:900; letter-spacing:.8px; text-transform:uppercase; }
    .lfm-badge-label.idle { color:#555 !important; text-shadow:none !important; animation:none !important; }

    /* ══ iOS-LIKE PULL DOWN FEEL ══ */
    .main-col, .right-col {
      will-change: transform;
    }
    @supports (-webkit-overflow-scrolling: touch) {
      body { -webkit-overflow-scrolling: touch; }
    }

    /* ══════════════════════════════════════════════════
       DYNAMIC PALETTE OVERRIDES — updated via JS
       NOTE: glass-bg stays neutral white; only glow/accent uses palette
    ══════════════════════════════════════════════════ */
    .lfm-hero-card {
      border-color: var(--dyn-border-a) !important;
    }
    .lfm-h-foot    { border-top-color: var(--dyn-border-b) !important; }

  </style>
</head>

/* ════════════════════════════════════════════════
   WALLPAPER DYNAMIC COLOR SYSTEM
   Extracts dominant hues from the body background
   and applies them as CSS variables across the UI.
════════════════════════════════════════════════ */
(function() {

  /* ─── luminance ─── */
  function lum(r, g, b) { return 0.299*r + 0.587*g + 0.114*b; }

  /* ─── relative luminance for WCAG contrast ─── */
  function relLum(r, g, b) {
    function c(v) { v /= 255; return v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4); }
    return 0.2126*c(r) + 0.7152*c(g) + 0.0722*c(b);
  }

  /* ─── contrast ratio ─── */
  function contrast(l1, l2) {
    var brt = Math.max(l1, l2), drk = Math.min(l1, l2);
    return (brt + 0.05) / (drk + 0.05);
  }

  /* ─── rgb → hsl ─── */
  function toHsl(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    var max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min, h = 0, s = 0, l = (max+min)/2;
    if (d > 0) {
      s = d / (1 - Math.abs(2*l - 1));
      if (max === r)      h = ((g-b)/d + 6) % 6;
      else if (max === g) h = (b-r)/d + 2;
      else                h = (r-g)/d + 4;
      h /= 6;
    }
    return [h, s, l];
  }

  /* ─── hsl → rgb ─── */
  function fromHsl(h, s, l) {
    var c = (1 - Math.abs(2*l-1))*s, x = c*(1-Math.abs((h*6)%2-1)), m = l - c/2;
    var r=0,g=0,b=0;

    else if (h<2/6) { r=x; g=c; }
    else if (h<3/6) { g=c; b=x; }
    else if (h<4/6) { g=x; b=c; }

      var ok  = true;
      for (var k = 0; k < picked.length; k++) {
        var dr = avg[0]-picked[k][0], dg = avg[1]-picked[k][1], db = avg[2]-picked[k][2];
        if (Math.sqrt(dr*dr + dg*dg + db*db) < 55) { ok = false; break; }
      }
      if (ok) picked.push(avg);
    }
    return picked;
  }

  /* ─── build glass rgba strings ─── */
  function rgba(c, a) { return 'rgba('+c[0]+','+c[1]+','+c[2]+','+a+')'; }
  function rgb(c)      { return 'rgb('+c[0]+','+c[1]+','+c[2]+')'; }

  /* ─── glow intensity: inversely proportional to raw saturation
       sat ≤ 0.38  → gf = 1.0   (full, fixed glow)
       sat = 0.70  → gf ≈ 0.48
       sat = 1.00  → gf = 0.12  (minimal — highly vivid colors get almost no glow) ─── */
  function calcGlowFactor(r, g, b) {
    var sat = toHsl(r, g, b)[1];
    if (sat <= 0.38) return 1.0;
    /* aggressive quadratic falloff above threshold */
    var t = (sat - 0.38) / 0.62;           /* 0→1 as sat goes 0.38→1 */
    return Math.max(0.12, 1.0 - t * t * 0.88);
  }

  /* ─── inject / update dynamic @keyframes + element overrides ─── */
  function injectStyles(a, s2, p, gf) {
    if (!_styleEl) {
      _styleEl = document.createElement('style');
      _styleEl.id = 'dynPaletteKF';
      document.head.appendChild(_styleEl);
    }
    /* scale helper — clamps alpha by glowFactor */
    function g(base) { return Math.min(1, base * gf); }
    /* blur-px also scaled so vivid colors don't spray too wide */
    function px(base) { return Math.round(base * (0.4 + gf * 0.6)) + 'px'; }

    _styleEl.textContent = [
      /* textGlowPulse → accent hue glow */
      '@keyframes textGlowPulse {',
      '  0%   { color:rgba(255,255,255,0.72); text-shadow:0 0 '+px(4)+' '+rgba(a,g(0.22))+'; }',
      '  12%  { color:#fff; text-shadow:0 0 '+px(8)+' '+rgba(a,g(0.95))+', 0 0 '+px(18)+' '+rgba(a,g(0.52))+', 0 0 '+px(34)+' '+rgba(a,g(0.24))+'; }',
      '  19%  { color:rgba(255,255,255,0.58); text-shadow:none; }',
      '  26%  { color:rgba(255,255,255,0.90); text-shadow:0 0 '+px(6)+' '+rgba(a,g(0.78))+', 0 0 '+px(14)+' '+rgba(a,g(0.38))+'; }',
      '  34%  { color:rgba(255,255,255,0.68); text-shadow:0 0 '+px(3)+' '+rgba(a,g(0.15))+'; }',
      '  100% { color:rgba(255,255,255,0.72); text-shadow:0 0 '+px(4)+' '+rgba(a,g(0.22))+'; }',
      '}',
      /* SVG icon glow */
      '@keyframes glowWhite {',
      '  0%   { fill:#fff; filter:drop-shadow(0 0 '+px(3)+' '+rgba(a,g(0.85))+'); }',
      '  50%  { fill:#fff; filter:drop-shadow(0 0 '+px(10)+' '+rgba(a,g(0.85))+'); }',
      '  100% { fill:#fff; filter:drop-shadow(0 0 '+px(3)+' '+rgba(a,g(0.85))+'); }',
      '}',
      /* sigil pulse */
      '@keyframes sigilPulse {',
      '  0%,100% { filter:invert(1) brightness(30) drop-shadow(0 0 3px #fff); }',
      '  50%     { filter:invert(1) brightness(30) drop-shadow(0 0 '+px(14)+' '+rgba(a,g(1))+') drop-shadow(0 0 '+px(28)+' '+rgba(a,g(0.45))+'); }',
      '}',
      /* breathe on intro sigil */
      '@keyframes breathe {',
      '  0%   { opacity:.10; filter:brightness(.4) drop-shadow(0 0 '+px(6)+' '+rgba(a,g(0.22))+'); }',
      '  50%  { opacity:.92; filter:brightness(1.4) drop-shadow(0 0 '+px(36)+' '+rgba(a,g(1))+') drop-shadow(0 0 '+px(60)+' '+rgba(a,g(0.42))+'); }',
      '  100% { opacity:.10; filter:brightness(.4) drop-shadow(0 0 '+px(6)+' '+rgba(a,g(0.22))+'); }',
      '}',
      /* lfmPulse dot tint */
      '.lfm-h-dot:not(.idle) { background:'+rgb(a)+' !important; box-shadow:0 0 '+px(10)+' '+rgba(a,g(1))+' !important; }',
      '.lfm-dot:not(.idle)   { background:'+rgb(a)+' !important; box-shadow:0 0 '+px(5)+' '+rgba(a,g(1))+' !important; }',
      '.tc-dot.done, .tc-dot.live { background:'+rgb(a)+' !important; box-shadow:0 0 '+px(7)+' '+rgba(a,g(0.72))+' !important; }',
      '.perf-fill { background:'+rgb(a)+' !important; }',
      '#volFill   { background:'+rgba(a,0.90)+' !important; }',
      '#volHandle { background:'+rgb(a)+' !important; box-shadow:0 0 5px '+rgba(a,g(0.6))+' !important; }',
      /* modal rows hover */
      '.lfm-modal-row:hover { border-color:'+rgba(s2,0.35)+' !important; background:'+rgba(p,0.10)+' !important; }',
      /* sparkle canvas halo tint via CSS filter (non-invasive) */
      '#sparkleCanvas, #sigilCanvas { filter:hue-rotate(var(--hue-rot,0deg)); }',
    ].join('\n');
  }

  /* ─── apply all CSS custom properties ─── */
  function applyPalette(colors) {
    if (!colors || colors.length === 0) return;

    var raw   = colors[0];
    var raw2  = colors[1] || raw;
    var raw3  = colors[2] || raw2;
    var raw4  = colors[3] || raw3;

    var p  = boostColor(raw[0],  raw[1],  raw[2]);
    var s  = boostColor(raw2[0], raw2[1], raw2[2]);
    var a  = boostColor(raw3[0], raw3[1], raw3[2]);
    var a2 = boostColor(raw4[0], raw4[1], raw4[2]);

    /* hue rotation for canvas sparkles (CSS filter, non-invasive) */
    var hsl = toHsl(a[0], a[1], a[2]);
    root.style.setProperty('--hue-rot', Math.round(hsl[0]*360) + 'deg');

    /* glow intensity computed from RAW pixel color (pre-boost) so true saturation is seen */
    var gf = calcGlowFactor(raw3[0], raw3[1], raw3[2]);

    /* glass background: tinted from wallpaper palette */
    root.style.setProperty('--glass-bg',       rgba(p, 0.22));
    root.style.setProperty('--glass-bg-hover', rgba(p, 0.30));
    root.style.setProperty('--glass',          rgba(p, 0.18));

    var borderAlpha = 0.26;

    /* border glow — only lfm-hero-card receives dynamic border via CSS override */
    root.style.setProperty('--dyn-border-a',   rgba(s, borderAlpha));
    root.style.setProperty('--dyn-border-b',   rgba(s, borderAlpha * 0.55));

    /* animated scard top border */
    root.style.setProperty('--accent-c1',  rgb(a));
    root.style.setProperty('--accent-c2',  rgb(a2));
    root.style.setProperty('--accent-c3',  rgb(s));
    root.style.setProperty('--accent-glow', rgba(a, +(0.18 + 0.40 * gf).toFixed(3)));

    /* card shadow: vivid → lighter tint, muted → richer */
    var shadowAlpha = +(0.12 + 0.18 * gf).toFixed(3);
    var shadowA = rgba(p, shadowAlpha);
    root.style.setProperty('--shadow-card',  '0 6px 32px '+shadowA+', 0 1px 0 rgba(255,255,255,0.08) inset');
    root.style.setProperty('--shadow-hover', '0 12px 40px '+shadowA+', 0 1px 0 rgba(255,255,255,0.14) inset');

    /* text stays white — adjust dim/mute only if bg is very bright */
    var bgLum = relLum(p[0], p[1], p[2]);
    if (bgLum > 0.40) {
      root.style.setProperty('--text',      '#080808');
      root.style.setProperty('--text-dim',  'rgba(0,0,0,0.70)');
      root.style.setProperty('--text-mute', 'rgba(0,0,0,0.42)');
    } else {
      root.style.setProperty('--text',      '#ffffff');
      root.style.setProperty('--text-dim',  'rgba(255,255,255,0.65)');
      root.style.setProperty('--text-mute', 'rgba(255,255,255,0.35)');
    }

    injectStyles(a, s, p, gf);
  }

  /* ─── load & sample image via Canvas ─── */
  function loadAndExtract(url) {
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
      try {
        var canvas = document.createElement('canvas');
        canvas.width = canvas.height = SAMPLE_SIZE;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, SAMPLE_SIZE, SAMPLE_SIZE);
        var data = ctx.getImageData(0, 0, SAMPLE_SIZE, SAMPLE_SIZE).data;
        var colors = extractPalette(data);
        if (colors && colors.length >= 2) {
          applyPalette(colors);
        }
      } catch(e) {
        /* CORS taint or security error — fail silently, keep defaults */
      }
    };
    img.onerror = function() { /* fail silently */ };
    /* cache-bust for CORS preflight compliance */
    img.src = url + (url.indexOf('?') === -1 ? '?' : '&') + '_cb=' + Date.now();
  }

  /* ─── watch for body background changes (wallpaper swap) ─── */
  function observeWallpaper() {
    var lastBg = '';
    setInterval(function() {
      var bg = getComputedStyle(document.body).backgroundImage;
      if (bg && bg !== lastBg) {
        lastBg = bg;
        var match = bg.match(/url\(["']?([^"')]+)/);
        if (match && match[1]) loadAndExtract(match[1]);
      }
    }, 3000);
  }

  /* ─── init — extract once on load, wallpaper is static ─── */
  loadAndExtract(WALLPAPER_URL);
})();

/* ════════════════════════════════════════════════
   FORCE-SYNC ALL SIGIL ANIMATIONS
════════════════════════════════════════════════ */
(function syncSigils() {
  function doSync() {
    var els = document.querySelectorAll('.sigil-img, .sigil-extra');
    if (!els.length) return;
    els.forEach(function(el) {
      var saved = el.style.animation;
      el.style.animation = 'none';
      void el.offsetWidth; /* force reflow */
      el.style.animation = saved || '';
      el.style.animationDelay = '0s';
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', doSync);
  } else {
    doSync();
  }
})();

/* ════════════════════════════════════════════════
   INTRO TIMER
════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', function() {
  var d = new Date();
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var el = document.getElementById('trackerDate');
  if (el) el.textContent = 'Today, ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();

  function updateTimeOfDay(date) {
    var h = date.getHours();
    var min = date.getMinutes();
    var uses12h = false;
    try {
      var testFmt = new Intl.DateTimeFormat(navigator.language, {hour:'numeric'}).format(new Date(2000,0,1,13));
      uses12h = /pm|am/i.test(testFmt);
    } catch(e) {}
    var label;
    if (h >= 5 && h < 12) {
      label = uses12h ? 'Morning' : 'Manhã';
    } else if (h >= 12 && h < 18) {
      label = uses12h ? 'Afternoon' : 'Tarde';
    } else {
      label = uses12h ? 'Night' : 'Noite';
    }
    var badge;
    if (uses12h) {
      var hh = h % 12 || 12;
      var mm = (min < 10 ? '0' : '') + min;
      badge = hh + ':' + mm + ' ' + (h < 12 ? 'AM' : 'PM');
    } else {
      var hh2 = (h < 10 ? '0' : '') + h;
      var mm2 = (min < 10 ? '0' : '') + min;
      badge = hh2 + ':' + mm2;
    }
    var lbl = document.getElementById('timeOfDayLabel');
    var bdg = document.getElementById('timeOfDayBadge');
    if (lbl) lbl.textContent = label;
    if (bdg) bdg.textContent = badge;
  }

  fetch('https://ipapi.co/json/')
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var tz = data.timezone;
      if (tz) {
        var now = new Date(new Date().toLocaleString('en-US', {timeZone: tz}));
        updateTimeOfDay(now);
      } else {
        updateTimeOfDay(new Date());
      }
    })
    .catch(function() { updateTimeOfDay(new Date()); });

  setInterval(function() { updateTimeOfDay(new Date()); }, 60000);

  var intro = document.getElementById('intro');
  var card  = document.getElementById('card');
  setTimeout(function() {
    intro.classList.add('fade-out');
    card.classList.add('revealed');
    setTimeout(function() { intro.style.display = 'none'; }, 1000);
    if (typeof startLyricsAuto === 'function') startLyricsAuto();
  }, 2800);
});

/* ════════════════════════════════════════════════
   SPARKLES (title area)
════════════════════════════════════════════════ */
(function() {
  var sc = document.getElementById('sparkleCanvas');
  if (!sc) return;
  var ctx = sc.getContext('2d');
  var W = sc.width = 200, H = sc.height = 50;
  var sparks = [], CYCLE = 2000;
  var COLORS = ['#ffffff','#cccccc','#999999','#555555','#222222','#555555','#cccccc'];
  function bwColor(o){ var t=((Date.now()%CYCLE)/CYCLE+o)%1; return COLORS[Math.floor(t*COLORS.length)%COLORS.length]; }
  function Spark(){ var a=Math.random()*Math.PI*2,r=20+Math.random()*40; this.x=W/2+Math.cos(a)*r; this.y=H/2+Math.sin(a)*r*.42; this.vx=(Math.random()-.5)*1.1; this.vy=(Math.random()-.5)*1.1; this.size=1.5+Math.random()*2.5; this.alpha=.75+Math.random()*.25; this.decay=.012+Math.random()*.018; this.rot=Math.random()*Math.PI; this.rotV=(Math.random()-.5)*.16; this.phase=Math.random(); }
  function drawStar(x,y,size,rot,alpha,color){ ctx.save(); ctx.globalAlpha=alpha; ctx.translate(x,y); ctx.rotate(rot); ctx.shadowColor=color; ctx.shadowBlur=8; ctx.fillStyle=color; ctx.beginPath(); for(var i=0;i<4;i++){var a=i*Math.PI/2,r1=size,r2=size*.28; ctx.lineTo(Math.cos(a)*r1,Math.sin(a)*r1); ctx.lineTo(Math.cos(a+Math.PI/4)*r2,Math.sin(a+Math.PI/4)*r2);} ctx.closePath(); ctx.fill(); ctx.restore(); }
  function loop(){ ctx.clearRect(0,0,W,H); if(sparks.length<20) sparks.push(new Spark()); for(var i=sparks.length-1;i>=0;i--){var s=sparks[i]; s.x+=s.vx; s.y+=s.vy; s.alpha-=s.decay; s.rot+=s.rotV; if(s.alpha<=0){sparks.splice(i,1);continue;} drawStar(s.x,s.y,s.size,s.rot,s.alpha,bwColor(s.phase));} requestAnimationFrame(loop); }
  loop();
})();

/* ════════════════════════════════════════════════
   DISCORD PRESENCE (Lanyard WebSocket)
════════════════════════════════════════════════ */
(function() {
  var DISCORD_ID = '1465005109640691765';
  var WS_URL  = 'wss://api.lanyard.rest/socket';
  var REST_URL = 'https://api.lanyard.rest/v1/users/' + DISCORD_ID;
  var ws, hbInterval, _lastOnline = null, _seenTimer = null;
  function _fmtSeen(ms) { var d=Math.floor((Date.now()-ms)/1000); if(d<60)return 'visto agora mesmo'; if(d<3600)return 'visto '+Math.floor(d/60)+'m atrás'; if(d<86400)return 'visto '+Math.floor(d/3600)+'h atrás'; return 'visto '+Math.floor(d/86400)+'d atrás'; }
  function _updateSeenLabel() { var el=document.getElementById('dcSeen'); if(!el)return; var dot=document.getElementById('dcDot'); var isOnline=dot&&dot.className.indexOf('offline')===-1; if(isOnline){el.textContent='';}else if(_lastOnline){el.textContent=_fmtSeen(_lastOnline);}else{el.textContent='último acesso desconhecido';} }
  function applyPresence(data) {
    var dot=document.getElementById('dcDot'), avatarEl=document.getElementById('dcAvatar');
    if(!dot)return;
    var s=data.discord_status||'offline'; dot.className='dc-dot '+s;
    if(s!=='offline'){_lastOnline=Date.now();clearInterval(_seenTimer);_seenTimer=setInterval(_updateSeenLabel,30000);}
    _updateSeenLabel();
    if(data.discord_user&&data.discord_user.avatar){var uid=data.discord_user.id,av=data.discord_user.avatar,ext=av.startsWith('a_')?'gif':'png'; avatarEl.src='https://cdn.discordapp.com/avatars/'+uid+'/'+av+'.'+ext+'?size=80';}
  }
  function connectWS() {
    ws=new WebSocket(WS_URL);
    ws.onmessage=function(e){var msg=JSON.parse(e.data); if(msg.op===1){hbInterval=setInterval(function(){if(ws.readyState===1)ws.send(JSON.stringify({op:3}));},msg.d.heartbeat_interval);ws.send(JSON.stringify({op:2,d:{subscribe_to_id:DISCORD_ID}}));} if(msg.op===0&&(msg.t==='INIT_STATE'||msg.t==='PRESENCE_UPDATE')){var p=msg.d[DISCORD_ID]||msg.d;if(p)applyPresence(p);}};
    ws.onclose=function(){clearInterval(hbInterval);setTimeout(connectWS,5000);};
  }
  fetch(REST_URL).then(function(r){return r.json();}).then(function(j){if(j.data)applyPresence(j.data);}).catch(function(){});
  if(DISCORD_ID!=='SEU_ID_AQUI') connectWS();
})();

/* ════════════════════════════════════════════════
   AUDIO PLAYER + VOLUME SLIDER
════════════════════════════════════════════════ */
(function() {
  var btn=document.getElementById('playBtn'),
      playIco=document.getElementById('playIcon'),
      pauseIco=document.getElementById('pauseIcon'),
      audio=document.getElementById('bgMusic'),
      volTrack=document.getElementById('volTrack'),
      volFill=document.getElementById('volFill'),
      volHandle=document.getElementById('volHandle'),
      volPct=document.getElementById('volPct');
  var dragging=false;
  function syncIcon(){if(!playIco||!pauseIco)return;var p=audio.paused; playIco.style.display=p?'block':'none'; pauseIco.style.display=!p?'block':'none';}
  audio.addEventListener('play',function(){syncIcon();var ac=document.getElementById('audioControls');if(ac)ac.classList.add('visible');});
  audio.addEventListener('pause',function(){syncIcon();var ac=document.getElementById('audioControls');if(ac)ac.classList.remove('visible');});
  audio.addEventListener('ended',function(){syncIcon();var ac=document.getElementById('audioControls');if(ac)ac.classList.remove('visible');});
  if(btn) btn.addEventListener('click',function(){if(audio.paused){var p=audio.play();if(p&&p.catch)p.catch(function(){});}else{audio.pause();}});
  function setVolume(r){r=Math.max(0,Math.min(1,r));audio.volume=r;var p=Math.round(r*100);if(volFill)volFill.style.width=p+'%';if(volHandle)volHandle.style.left=p+'%';if(volPct)volPct.textContent=p+'%';}
  function ratioFromEvent(e){var rect=volTrack.getBoundingClientRect(),cx=e.touches?e.touches[0].clientX:e.clientX;return(cx-rect.left)/rect.width;}
  if(volTrack){volTrack.addEventListener('mousedown',function(e){dragging=true;setVolume(ratioFromEvent(e));e.preventDefault();});}
  document.addEventListener('mousemove',function(e){if(dragging)setVolume(ratioFromEvent(e));});
  document.addEventListener('mouseup',function(){dragging=false;});
  if(volTrack){volTrack.addEventListener('touchstart',function(e){dragging=true;setVolume(ratioFromEvent(e));e.preventDefault();},{passive:false});}
  document.addEventListener('touchmove',function(e){if(dragging)setVolume(ratioFromEvent(e));},{passive:true});
  document.addEventListener('touchend',function(){dragging=false;});
  setVolume(1);
})();

function switchTab(tab, btn) {
  document.querySelectorAll('.sect-tab').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.sect-tab[data-tab="'+tab+'"]').forEach(function(b){ b.classList.add('active'); });
  var cards = document.querySelectorAll('.scard');
  cards.forEach(function(c) {
    if (tab === 'all') {
      c.style.display = '';
    } else {
      c.style.display = c.classList.contains(tab) ? '' : 'none';
    }
  });
  var grid = document.querySelector('.social-cards');
  if (grid) grid.style.gridTemplateColumns = tab === 'all' ? '' : '1fr';
}

function openLfmModal() {
  var m = document.getElementById('lfmModal');
  if (m) { m.style.display = 'flex'; requestAnimationFrame(function(){ m.classList.add('open'); }); }
}
function closeLfmModal() {
  var m = document.getElementById('lfmModal');
  if (m) { m.classList.remove('open'); setTimeout(function(){ m.style.display='none'; }, 300); }
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeLfmModal(); });

/* ════════════════════════════════════════════════
   LAST.FM
════════════════════════════════════════════════ */
(function() {
  var LFM_USER = 'guzrr';
  var LFM_KEY  = 'e1bc17070fbe3d2cbe8ecda746ff7676';
  var POLL_MS  = 30000;
  var _lastTrackKey = '';

  var scrobEl   = document.getElementById('lfm-scrobbles-count');
  var profAvEl  = document.getElementById('lfm-profile-av');
  var userNameEl= document.getElementById('lfm-username');

  var modalDot   = document.getElementById('modal-dot');
  var modalLabel = document.getElementById('modal-now-label');

  var hArt    = document.getElementById('lfm-h-art');
  var hTrack  = document.getElementById('lfm-h-track');
  var hArtist = document.getElementById('lfm-h-artist');
  var hDot    = document.getElementById('lfm-h-dot');
  var hLabel  = document.getElementById('lfm-h-label');
  var hAv     = document.getElementById('lfm-h-av');
  var hUname  = document.getElementById('lfm-h-uname');
  var hScr    = document.getElementById('lfm-h-scr');

  var perfCur  = document.getElementById('perfCurrent');
  var perfFill = document.getElementById('perfFill');
  var perfTotalEl = document.getElementById('perfTotal');
  var PERF_BASE = 30000;
  var PERF_STEP = 20000;

  function calcPerfTarget(n) {
    var t = PERF_BASE;
    while (n >= t) t += PERF_STEP;
    return t;
  }

  var tcDot  = document.getElementById('lfm-tc-dot');
  var tcText = document.getElementById('lfm-tc-text');

  function loadUserInfo() {
    var url = 'https://ws.audioscrobbler.com/2.0/'
      + '?method=user.getinfo'
      + '&user='    + encodeURIComponent(LFM_USER)
      + '&api_key=' + encodeURIComponent(LFM_KEY)
      + '&format=json';
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data) {
        if (!data.user) return;
        var u = data.user;
        if (userNameEl && u.name) userNameEl.textContent = u.name;
        if (hUname     && u.name) hUname.textContent     = u.name;
        if (u.playcount) {
          var n = parseInt(u.playcount, 10);
          var fmt = n.toLocaleString('pt-BR');
          if (scrobEl)  scrobEl.textContent  = fmt + ' scrobbles';
          if (hScr)     hScr.textContent     = fmt + ' scrobbles';
          if (perfCur)  perfCur.textContent  = fmt;
          var target = calcPerfTarget(n);
          var prevTarget = target - PERF_STEP;
          if (perfTotalEl) perfTotalEl.textContent = (target / 1000) + 'k';
          if (perfFill) {
            var pct = Math.min(100, Math.round(((n - prevTarget) / PERF_STEP) * 100));
            perfFill.style.width = pct + '%';
          }
        }
        var imgs = u.image || [], src = '';
        for (var i = imgs.length - 1; i >= 0; i--) {
          if (imgs[i]['#text'] && imgs[i]['#text'].indexOf('2a96cbd8') === -1) {
            src = imgs[i]['#text']; break;
          }
        }
        if (src) {
          if (profAvEl) profAvEl.src = src;
          if (hAv)      hAv.src = src;
        }
      })
      .catch(function(){});
  }

  function pollNowPlaying() {
    var url = 'https://ws.audioscrobbler.com/2.0/'
      + '?method=user.getrecenttracks'
      + '&user='    + encodeURIComponent(LFM_USER)
      + '&api_key=' + encodeURIComponent(LFM_KEY)
      + '&format=json&limit=1';
    fetch(url)
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(data) {
        if (data.error || !data.recenttracks) { setIdle(); return; }
        var tracks = data.recenttracks.track;
        if (!tracks) { setIdle(); return; }
        var t = Array.isArray(tracks) ? tracks[0] : tracks;
        var nowPlaying = !!(t['@attr'] && t['@attr']['nowplaying'] === 'true');
        var name   = t.name   || '—';
        var artist = (t.artist && t.artist['#text']) || '';
        var key    = name + '|' + artist;

        if (hTrack)   hTrack.textContent   = name;
        if (hArtist)  hArtist.textContent  = artist;

        var q = encodeURIComponent(artist + ' ' + name);
        var ytLink = document.getElementById('lfm-yt-link');
        var spLink = document.getElementById('lfm-sp-link');
        var scLink = document.getElementById('lfm-sc-link');
        if (ytLink) ytLink.href = 'https://music.youtube.com/search?q=' + q;
        if (spLink) spLink.href = 'https://open.spotify.com/search/' + q;
        if (scLink) scLink.href = 'https://soundcloud.com/search?q=' + q;
        ['1','2','3'].forEach(function(n2){
          var a = document.getElementById('modal-artist'+n2);
          var t2 = document.getElementById('modal-track'+n2);
          if (a) a.textContent = artist;
          if (t2) t2.textContent = name;
        });

        if (nowPlaying) {
          if (hDot)    hDot.className    = 'lfm-h-dot';
          if (hLabel)  { hLabel.className = 'lfm-h-label'; hLabel.textContent = 'LIVE'; }
          if (modalDot)   modalDot.className   = 'lfm-h-dot';
          if (modalLabel) modalLabel.textContent = 'AGORA TOCANDO';
          if (tcDot)   tcDot.className   = 'tc-dot live';
          if (tcText)  tcText.textContent = 'Last.fm: ' + name.substring(0,18);
        } else {
          if (hDot)    hDot.className    = 'lfm-h-dot idle';
          if (hLabel)  { hLabel.className = 'lfm-h-label idle'; hLabel.textContent = 'LAST'; }
          if (modalDot)   modalDot.className   = 'lfm-h-dot idle';
          if (modalLabel) modalLabel.textContent = 'LAST PLAYED';
          if (tcDot)   tcDot.className   = 'tc-dot';
          if (tcText)  tcText.textContent = 'Last.fm: ' + name.substring(0,18);
        }

        if (key !== _lastTrackKey) {
          _lastTrackKey = key;
          var imgs = t.image || [], art = '';
          for (var i = imgs.length - 1; i >= 0; i--) {
            var u2 = imgs[i]['#text'];
            if (u2 && u2.indexOf('2a96cbd8') === -1) { art = u2; break; }
          }
          if (hArt)  { hArt.src  = art ? art : ''; hArt.style.opacity  = art ? '1' : '0'; }
          var heroCard = document.querySelector('.lfm-hero-card');
          if (heroCard && art) {
            heroCard.style.setProperty('--lfm-art-url', 'url(' + art + ')');
          }
          var bg = document.getElementById('lfm-card-bg');
          if (bg && art && !(profAvEl && profAvEl.src)) bg.style.backgroundImage = 'url(' + art + ')';
        }
      })
      .catch(function(){ setIdle(); });

    setTimeout(pollNowPlaying, POLL_MS);
  }

  function setIdle() {
    if (hDot)    hDot.className    = 'lfm-h-dot idle';
    if (hLabel)  { hLabel.className = 'lfm-h-label idle'; hLabel.textContent = 'LAST'; }
    if (modalDot)   modalDot.className   = 'lfm-h-dot idle';
    if (hTrack   && !hTrack.textContent)   hTrack.textContent   = '—';
    if (hArtist  && !hArtist.textContent)  hArtist.textContent  = '—';
  }

  loadUserInfo();
  pollNowPlaying();
})();
</script>
