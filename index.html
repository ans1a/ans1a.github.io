<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ansia – a's</title>
  <style>
    @import url('https://fonts.cdnfonts.com/css/evolve-sans');
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0a0a0a;
      color:#fff;
      font-family:'Evolve Sans',sans-serif;
      overflow:hidden;
    }
    #borderVid{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:.6;
      z-index:-2;
    }
    #overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.60);
      z-index:-1;
    }
    .card{
      width:380px;
      height:385px;
      text-align:center;
      border-radius:20px;
      padding:40px;
      position:relative;
    }
    .cardBgVid{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:20px;
      opacity:.69;
      z-index:-1;
    }
    .card::after{
      content:'';
      position:absolute;
      inset:0;
      border-radius:20px;
      background:rgba(0,0,0,.35);
      backdrop-filter:blur(14px) saturate(120%);
      -webkit-backdrop-filter:blur(14px) saturate(120%);
      z-index:-1;
    }
    #visitor-ip{
      position:absolute;
      bottom:12px;
      left:16px;
      font-size:10px;
      color:#FF0000;
      opacity:.7;
      text-shadow:0 0 4px #FF0000;
    }
    .gif-wrap{
      width:128px;
      height:128px;
      margin:0 auto 16px;
      border-radius:50%;
      overflow:hidden;
    }
    .gif-wrap img{
      width:100%;height:100%;
      object-fit:cover;
      opacity:.59;
    }
    .title,
    .verse,
    .icons a svg{
      animation:fireRed 2.5s linear infinite;
    }
    @keyframes fireRed{
      0%   {color:#FF0000;text-shadow:0 0 8px #FF0000;fill:#FF0000}
      33%  {color:#FF3300;text-shadow:0 0 8px #FF3300;fill:#FF3300}
      66%  {color:#8B0000;text-shadow:0 0 8px #8B0000;fill:#8B0000}
      100% {color:#FF0000;text-shadow:0 0 8px #FF0000;fill:#FF0000}
    }
    .title{
      font-size:16px;
      font-weight:700;
      letter-spacing:.5px;
      margin-bottom:8px;
    }
    .verse{
      font-size:11px;
      font-weight:700;
      line-height:1.4;
      opacity:.85;
      margin-bottom:24px;
      max-width:260px;
      margin-left:auto;
      margin-right:auto;
      position:relative;
      height:32px;
    }
    .verse span{
      position:absolute;
      left:0;right:0;
      transition:opacity 1s ease;
    }
    .icons{
      display:flex;
      justify-content:center;
      gap:26px;
    }
    .icons a svg{
      width:24px;
      height:24px;
      transition:transform .15s;
    }
    .icons a:active svg{transform:scale(.88)}
  </style>
</head>
<body>

  <video id="borderVid" autoplay loop muted>
    <source src="https://i.imgur.com/IeVScXP.mp4" type="video/mp4">
  </video>
  <div id="overlay"></div>

  <div class="card">
    <video class="cardBgVid" autoplay loop muted playsinline>

    <div class="gif-wrap">

    <div class="title">ANSIA - A'S</div>

    <div id="visitor-ip"></div>
  </div>

  <script>
    fetch('https://api.ipify.org?format=json')
      .then(r => r.json())
      .then(d => document.getElementById('visitor-ip').textContent = d.ip)
      .catch(() => document.getElementById('visitor-ip').textContent = 'IP não disponível');
  </script>

  <script>
    (function loop(){
      const l1 = document.getElementById('line1');
      const l2 = document.getElementById('line2');
      setTimeout(()=>{l1.style.opacity=0;l2.style.opacity=1;},2200);
      setTimeout(()=>{l1.style.opacity=1;l2.style.opacity=0;},4400);
      setTimeout(loop,4400);
    })();
  </script>
